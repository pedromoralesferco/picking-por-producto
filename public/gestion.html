<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Picking por Producto - Gestión de Rutas</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="/css/app.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar-app">
        <div class="brand">
            <i class="bi bi-boxes"></i>
            <span>Picking por Producto</span>
        </div>
        <div class="nav-info">
            <a href="/dashboard"><i class="bi bi-arrow-left"></i> Dashboard</a>
        </div>
    </nav>

    <div class="app-layout">
        <div class="panel-rutas">
            <div class="panel-header">
                <div class="panel-header-top">
                    <h6><i class="bi bi-list-ul"></i> Rutas <span id="rutasCount" class="badge-count">0</span></h6>
                </div>
                <input type="text" class="search-rutas" id="searchRutas" placeholder="Buscar por número o nombre de ruta..." oninput="filterRutas(this.value)">
            </div>
            <div class="rutas-list" id="rutasList"></div>
        </div>

        <div class="panel-detalle" id="panelDetalle">
            <div class="empty-state">
                <i class="bi bi-cursor"></i>
                <p>Selecciona una ruta para ver sus productos</p>
            </div>
        </div>
    </div>

    <div id="pickerModal" class="modal-overlay" style="display:none">
        <div class="modal-content" style="position:relative">
            <div class="modal-header">
                <h5><i class="bi bi-people"></i> Seleccionar Operario</h5>
                <p id="pickerModalSubtitle">Elige un operario para asignar el producto</p>
                <button class="modal-close" onclick="closePickerModal()">&times;</button>
            </div>
            <div class="modal-body">
                <input type="text" class="picker-search" placeholder="Buscar operario..." oninput="filterPickers(this.value)">
                <div id="pickerList"></div>
            </div>
        </div>
    </div>

    <div id="carrilModal" class="modal-overlay" style="display:none">
        <div class="modal-content" style="position:relative">
            <div class="modal-header">
                <h5><i class="bi bi-signpost-2"></i> Seleccionar Carril</h5>
                <p id="carrilModalSubtitle">Elige un carril para asignar la ruta antes de iniciar</p>
                <button class="modal-close" onclick="closeCarrilModal()">&times;</button>
            </div>
            <div class="modal-body">
                <div id="carrilList"></div>
                <div style="text-align:center;margin-top:1rem">
                    <button class="btn-action" onclick="confirmIniciarSinCarril()" style="background:#888;color:white;border:none;padding:0.5rem 1rem;border-radius:8px;font-size:0.85rem;cursor:pointer">
                        <i class="bi bi-skip-forward"></i> Iniciar sin carril
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script src="/js/app.js"></script>
</body>
</html>
