<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Despacho - Picking por Producto</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <style>
        :root {
            --primary: #d4a826;
            --primary-dark: #b8941f;
            --dark: #222222;
            --dark-light: #2d2d2d;
            --success: #2e7d32;
            --danger: #c62828;
            --blue: #1565c0;
            --bg: #f5f5f5;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .header {
            background: var(--dark);
            color: white;
            padding: 0.6rem 1.2rem;
            box-shadow: 0 2px 8px rgba(0,0,0,0.3);
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 3px solid var(--primary);
            flex-shrink: 0;
        }

        .header .brand { font-size: 0.7rem; font-weight: 800; letter-spacing: 2px; color: var(--primary); }
        .header h1 { font-size: 1rem; font-weight: 700; }
        .header h1 i { color: var(--primary); }

        .btn-link {
            background: transparent; border: 1px solid #555; color: #ccc;
            padding: 0.3rem 0.6rem; border-radius: 6px; cursor: pointer;
            font-size: 0.78rem; text-decoration: none; transition: all 0.2s;
        }
        .btn-link:hover { background: #444; color: white; }

        /* ── Master-Detail: left carriles | right detail ── */
        .app-layout {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        /* ── Left panel: Carriles stacked vertically ── */
        .panel-carriles {
            width: 380px;
            min-width: 320px;
            background: white;
            border-right: 1px solid #e0e0e0;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .panel-carriles-header {
            padding: 0.5rem 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #e8e8e8;
            flex-shrink: 0;
        }

        .panel-carriles-header h3 {
            font-size: 0.85rem;
            font-weight: 700;
            color: var(--dark);
        }

        .panel-carriles-header select {
            padding: 0.25rem 0.5rem;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 0.75rem;
            outline: none;
        }

        .carriles-scroll {
            flex: 1;
            overflow-y: auto;
            padding: 0.5rem;
        }

        /* Each carril is a row stacked vertically */
        .carril-row {
            margin-bottom: 0.5rem;
            border: 1px solid #e8e8e8;
            border-radius: 8px;
            overflow: hidden;
        }

        .carril-row-header {
            background: var(--dark);
            color: white;
            padding: 0.35rem 0.7rem;
            display: flex;
            align-items: center;
            gap: 0.4rem;
            font-size: 0.78rem;
        }

        .carril-row-header h4 {
            font-size: 0.75rem;
            font-weight: 700;
            flex: 1;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .carril-row-header h4 i { color: var(--primary); margin-right: 0.15rem; }

        .carril-row-header .badge-count {
            background: var(--primary); color: var(--dark);
            padding: 0.05rem 0.35rem; border-radius: 8px;
            font-size: 0.65rem; font-weight: 700;
        }

        /* Routes inside carril: horizontal scroll */
        .carril-routes {
            display: flex;
            overflow-x: auto;
            gap: 0.4rem;
            padding: 0.4rem;
        }

        .carril-routes::-webkit-scrollbar { height: 3px; }
        .carril-routes::-webkit-scrollbar-thumb { background: #ccc; border-radius: 2px; }

        /* ── Route chip (compact, horizontal) ── */
        .route-chip {
            min-width: 140px;
            max-width: 180px;
            flex-shrink: 0;
            padding: 0.4rem 0.6rem;
            border-radius: 6px;
            cursor: pointer;
            border: 1px solid #e8e8e8;
            transition: all 0.15s;
        }

        .route-chip:hover { box-shadow: 0 1px 4px rgba(0,0,0,0.08); }
        .route-chip.active { border-color: var(--primary); box-shadow: 0 0 0 2px rgba(212,168,38,0.3); }

        .route-chip.estado-pendiente { background: rgba(212,168,38,0.08); }
        .route-chip.estado-listo { background: rgba(46,125,50,0.08); }
        .route-chip.estado-finalizado { background: rgba(21,101,192,0.08); }

        .rc-title {
            font-weight: 700;
            font-size: 0.72rem;
            color: var(--dark);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .rc-meta {
            font-size: 0.62rem;
            color: #999;
            margin-top: 1px;
        }

        .rc-bar {
            width: 100%;
            height: 3px;
            background: #e0e0e0;
            border-radius: 2px;
            margin-top: 4px;
            overflow: hidden;
        }
        .rc-bar .fill {
            height: 100%;
            border-radius: 2px;
            background: var(--primary);
            transition: width 0.3s;
        }
        .rc-bar .fill.complete { background: var(--success); }

        .rc-pct {
            font-size: 0.62rem;
            font-weight: 700;
            color: #999;
            text-align: right;
            margin-top: 1px;
        }

        /* ── Right panel: Detail ── */
        .panel-detail {
            flex: 1;
            overflow-y: auto;
            padding: 1.5rem;
            background: var(--bg);
        }

        .empty-detail {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: #bbb;
        }

        .empty-detail i { font-size: 3rem; margin-bottom: 0.8rem; opacity: 0.4; }
        .empty-detail p { font-size: 0.9rem; }

        /* ── Route header card ── */
        .route-header-card {
            background: white;
            border-radius: 12px;
            padding: 1.2rem 1.5rem;
            margin-bottom: 1rem;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
        }

        .route-header-top {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 0.8rem;
        }

        .route-header-title {
            font-size: 1.15rem;
            font-weight: 800;
            color: var(--dark);
        }

        .route-header-subtitle {
            font-size: 0.85rem;
            color: #666;
            margin-top: 0.15rem;
        }

        .route-header-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
            gap: 0.8rem;
            margin-bottom: 0.8rem;
        }

        .rh-field label {
            font-size: 0.68rem;
            text-transform: uppercase;
            color: #999;
            font-weight: 600;
            display: block;
            margin-bottom: 0.1rem;
        }

        .rh-field .value {
            font-size: 0.88rem;
            font-weight: 600;
            color: var(--dark);
        }

        .estado-pill {
            display: inline-block;
            padding: 0.15rem 0.5rem;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: 700;
        }

        .estado-pill.pendiente { background: rgba(212,168,38,0.15); color: #b8941f; }
        .estado-pill.listo-carga { background: rgba(46,125,50,0.12); color: var(--success); }
        .estado-pill.finalizado-despacho { background: rgba(21,101,192,0.1); color: var(--blue); }
        .estado-pill.picking-iniciado { background: rgba(255,152,0,0.12); color: #e65100; }
        .estado-pill.picking-finalizado { background: rgba(46,125,50,0.12); color: var(--success); }

        .route-header-actions {
            display: flex;
            gap: 0.5rem;
            margin-top: 0.5rem;
        }

        .btn-estado {
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            font-size: 0.78rem;
            font-weight: 600;
            cursor: pointer;
            border: none;
            transition: opacity 0.2s;
        }

        .btn-estado:hover { opacity: 0.85; }
        .btn-estado:disabled { opacity: 0.35; cursor: not-allowed; }

        .btn-listo { background: var(--success); color: white; }
        .btn-finalizar-despacho { background: var(--blue); color: white; }
        .btn-revertir { background: #eee; color: #666; border: 1px solid #ddd; }

        .picking-bar-lg {
            height: 6px;
            background: #e8e8e8;
            border-radius: 3px;
            overflow: hidden;
            margin-top: 0.6rem;
        }

        .picking-bar-lg .fill {
            height: 100%;
            border-radius: 3px;
            transition: width 0.3s;
        }

        .picking-bar-lg .fill.complete { background: var(--success); }
        .picking-bar-lg .fill.in-progress { background: var(--primary); }

        /* ── Documents list ── */
        .docs-header {
            font-size: 0.88rem;
            font-weight: 700;
            color: var(--dark);
            margin-bottom: 0.6rem;
            display: flex;
            align-items: center;
            gap: 0.4rem;
        }

        .docs-header .badge-count {
            background: var(--primary);
            color: var(--dark);
            padding: 0.1rem 0.45rem;
            border-radius: 8px;
            font-size: 0.7rem;
            font-weight: 700;
        }

        .doc-card {
            background: white;
            border-radius: 10px;
            margin-bottom: 0.5rem;
            box-shadow: 0 1px 4px rgba(0,0,0,0.04);
            overflow: hidden;
            border: 1px solid #e8e8e8;
        }

        .doc-card-header {
            padding: 0.6rem 1rem;
            display: flex;
            align-items: center;
            gap: 0.6rem;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
            transition: background 0.1s;
        }

        .doc-card-header:hover { background: #fafafa; }

        .doc-icon { font-size: 1rem; flex-shrink: 0; }
        .doc-icon.done { color: var(--success); }
        .doc-icon.pending { color: #ccc; }

        .doc-info { flex: 1; min-width: 0; }

        .doc-name {
            font-weight: 700;
            font-size: 0.85rem;
            color: var(--dark);
        }

        .doc-meta {
            font-size: 0.72rem;
            color: #999;
        }

        .doc-right {
            text-align: right;
            flex-shrink: 0;
        }

        .doc-weight {
            font-size: 0.78rem;
            font-weight: 600;
            color: #555;
        }

        .doc-status {
            font-size: 0.65rem;
        }

        .doc-toggle {
            color: #ccc;
            font-size: 0.85rem;
            transition: transform 0.2s;
            flex-shrink: 0;
        }

        .doc-toggle.open { transform: rotate(90deg); }

        /* ── Products inside document ── */
        .doc-products {
            display: none;
            border-top: 1px solid #f0f0f0;
            padding: 0.4rem 1rem 0.6rem 2.6rem;
        }

        .doc-products.open { display: block; }

        .prod-row {
            display: flex;
            align-items: center;
            padding: 0.3rem 0;
            gap: 0.5rem;
            font-size: 0.72rem;
            border-bottom: 1px solid #f8f8f8;
        }

        .prod-row:last-child { border-bottom: none; }

        .prod-icon { font-size: 0.75rem; flex-shrink: 0; }
        .prod-icon.done { color: var(--success); }
        .prod-icon.pending { color: #ddd; }

        .prod-name {
            flex: 1; min-width: 0;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
            color: #555;
        }

        .prod-qty {
            flex-shrink: 0;
            font-weight: 600;
            color: #777;
        }

        .prod-qty.done { color: var(--success); }

        .loading-detail {
            text-align: center;
            padding: 2rem;
            color: #aaa;
        }

        @media (max-width: 768px) {
            .app-layout { flex-direction: column; }
            .panel-carriles { width: 100%; min-width: 100%; max-height: 35vh; border-right: none; border-bottom: 1px solid #e0e0e0; }
            .panel-detail { padding: 0.8rem; }
        }
    </style>
</head>
<body>
    <div class="header">
        <div>
            <div class="brand">FERCO CERAMICA</div>
            <h1><i class="bi bi-truck"></i> Gestion de Despacho</h1>
        </div>
        <a href="/dashboard" class="btn-link"><i class="bi bi-arrow-left"></i> Dashboard</a>
    </div>

    <div class="app-layout">
        <!-- Left: Carriles stacked, routes horizontal inside -->
        <div class="panel-carriles">
            <div class="panel-carriles-header">
                <h3><i class="bi bi-signpost-2" style="color:var(--primary)"></i> Carriles</h3>
                <select id="centroFilter" onchange="renderCarriles()">
                    <option value="">Todos</option>
                </select>
            </div>
            <div class="carriles-scroll" id="carrilesList"></div>
        </div>

        <!-- Right: Detail -->
        <div class="panel-detail" id="panelDetail">
            <div class="empty-detail">
                <i class="bi bi-cursor"></i>
                <p>Selecciona una ruta para ver sus documentos</p>
            </div>
        </div>
    </div>

    <script>
        let despachoData = [];
        let allCarriles = [];
        let selectedRoute = null;
        let selectedRoutePlanId = null;
        let openDocs = new Set();
        let refreshTimer = null;
        let pickingMode = 'product'; // 'product' or 'order'

        async function init() {
            try {
                const res = await fetch('/api/auth/me');
                if (!res.ok) { window.location.href = '/login'; return; }
                const user = await res.json();
                pickingMode = (user.selectedPais === 'SV') ? 'order' : 'product';
            } catch { window.location.href = '/login'; return; }

            await loadCentros();
            await loadAllCarriles();
            await loadDespacho();
            refreshTimer = setInterval(loadDespacho, 30000);
        }

        async function loadCentros() {
            try {
                const res = await fetch('/api/centros');
                const centros = await res.json();
                const select = document.getElementById('centroFilter');
                centros.forEach(c => {
                    const opt = document.createElement('option');
                    opt.value = c.ID_Centro;
                    opt.textContent = c.Nombre;
                    select.appendChild(opt);
                });
            } catch (err) { console.error(err); }
        }

        async function loadAllCarriles() {
            try {
                const res = await fetch('/api/carriles');
                allCarriles = await res.json();
            } catch (err) { console.error(err); }
        }

        async function loadDespacho() {
            try {
                const url = pickingMode === 'order' ? '/api/order/despacho/rutas' : '/api/despacho/rutas';
                const res = await fetch(url);
                despachoData = await res.json();
                renderCarriles();
            } catch (err) { console.error(err); }
        }

        function renderCarriles() {
            const container = document.getElementById('carrilesList');
            const centroFilter = document.getElementById('centroFilter').value;

            let carriles = allCarriles;
            let routes = despachoData;
            if (centroFilter) {
                carriles = carriles.filter(c => c.ID_Centro == centroFilter);
                routes = routes.filter(r => r.ID_Centro == centroFilter);
            }

            const groups = {};
            routes.forEach(r => {
                const key = r.ID_Carril || 0;
                if (!groups[key]) groups[key] = [];
                groups[key].push(r);
            });

            const carrilesWithRoutes = carriles.filter(c => groups[c.ID_Carril] && groups[c.ID_Carril].length > 0);

            if (carrilesWithRoutes.length === 0) {
                container.innerHTML = '<div style="text-align:center;padding:2rem;color:#bbb"><i class="bi bi-inbox" style="font-size:2rem;display:block;margin-bottom:0.5rem"></i>Sin rutas pendientes</div>';
                return;
            }

            container.innerHTML = carrilesWithRoutes.map(carril => {
                const routeList = groups[carril.ID_Carril] || [];

                return `
                    <div class="carril-row">
                        <div class="carril-row-header">
                            <h4><i class="bi bi-signpost-2"></i> ${esc(carril.Nombre)}</h4>
                            <span class="badge-count">${routeList.length}</span>
                        </div>
                        <div class="carril-routes">
                            ${routeList.map(r => renderRouteChip(r)).join('')}
                        </div>
                    </div>
                `;
            }).join('');
        }

        function renderRouteChip(r) {
            const estadoDespacho = r.EstadoDespacho || 'Pendiente';
            const totalItems = pickingMode === 'order' ? (r.TotalPedidos || 0) : (r.TotalProductos || 0);
            const finItems = pickingMode === 'order' ? (r.PedidosFinalizados || 0) : (r.ProductosFinalizados || 0);
            const pickingPct = totalItems > 0 ? Math.round((finItems / totalItems) * 100) : 0;
            let estadoClass = 'estado-pendiente';
            if (estadoDespacho === 'Listo para Carga') estadoClass = 'estado-listo';
            if (estadoDespacho === 'Finalizado') estadoClass = 'estado-finalizado';

            const isActive = pickingMode === 'order'
                ? selectedRoutePlanId === r.ID_RoutePlan
                : selectedRoute === r.RouteNumber;

            const onClickFn = pickingMode === 'order'
                ? `selectRouteOrder(${r.ID_RoutePlan}, ${r.RouteNumber})`
                : `selectRoute(${r.RouteNumber})`;

            return `
                <div class="route-chip ${estadoClass} ${isActive ? 'active' : ''}" onclick="${onClickFn}">
                    <div class="rc-title">#${r.RouteNumber} — ${esc(r.RouteName || '')}</div>
                    <div class="rc-meta">${formatNum(r.PesoEstimado || 0)} kg</div>
                    <div class="rc-bar"><div class="fill ${pickingPct === 100 ? 'complete' : ''}" style="width:${pickingPct}%"></div></div>
                    <div class="rc-pct">${pickingPct}%</div>
                </div>
            `;
        }

        async function selectRoute(routeNumber) {
            selectedRoute = routeNumber;
            openDocs = new Set();
            renderCarriles();

            const panel = document.getElementById('panelDetail');
            panel.innerHTML = '<div class="loading-detail"><i class="bi bi-hourglass-split"></i> Cargando...</div>';

            const ruta = despachoData.find(r => r.RouteNumber === routeNumber);
            if (!ruta) return;

            try {
                const res = await fetch('/api/despacho/rutas/' + routeNumber + '/documentos');
                if (!res.ok) {
                    const errData = await res.json().catch(() => ({}));
                    throw new Error(errData.error || 'HTTP ' + res.status);
                }
                const docs = await res.json();
                renderDetail(ruta, docs);
            } catch (err) {
                console.error('Error cargando documentos:', err);
                panel.innerHTML = '<div class="loading-detail" style="color:#c62828"><i class="bi bi-exclamation-triangle"></i> Error al cargar documentos: ' + esc(err.message) + '</div>';
            }
        }

        function renderDetail(ruta, docs) {
            const panel = document.getElementById('panelDetail');
            const estadoDespacho = ruta.EstadoDespacho || 'Pendiente';
            const estadoPicking = ruta.Estado || 'Iniciado';
            const pickingPct = ruta.TotalProductos > 0 ? Math.round((ruta.ProductosFinalizados / ruta.TotalProductos) * 100) : 0;
            const pickingComplete = estadoPicking === 'Finalizado';

            let despachoPillClass = 'pendiente';
            if (estadoDespacho === 'Listo para Carga') despachoPillClass = 'listo-carga';
            if (estadoDespacho === 'Finalizado') despachoPillClass = 'finalizado-despacho';

            let pickingPillClass = pickingComplete ? 'picking-finalizado' : 'picking-iniciado';

            let actionsHtml = '';
            if (estadoDespacho === 'Pendiente') {
                actionsHtml = `
                    <button class="btn-estado btn-listo" ${pickingComplete ? '' : 'disabled title="Picking no finalizado"'} onclick="cambiarEstado(${ruta.RouteNumber}, 'Listo para Carga')">
                        <i class="bi bi-check2-square"></i> Marcar Listo para Carga
                    </button>`;
            } else if (estadoDespacho === 'Listo para Carga') {
                actionsHtml = `
                    <button class="btn-estado btn-finalizar-despacho" onclick="cambiarEstado(${ruta.RouteNumber}, 'Finalizado')">
                        <i class="bi bi-truck"></i> Finalizar Despacho
                    </button>
                    <button class="btn-estado btn-revertir" onclick="cambiarEstado(${ruta.RouteNumber}, 'Pendiente')">
                        <i class="bi bi-arrow-counterclockwise"></i> Revertir
                    </button>`;
            }

            const docsFinalizados = docs.filter(d => d.Estado === 'Finalizado').length;

            panel.innerHTML = `
                <div class="route-header-card">
                    <div class="route-header-top">
                        <div>
                            <div class="route-header-title">#${ruta.RouteNumber} — ${esc(ruta.RouteName || '')}</div>
                            <div class="route-header-subtitle"><i class="bi bi-signpost-2" style="color:var(--primary)"></i> ${esc(ruta.CarrilNombre || 'Sin carril')}</div>
                        </div>
                    </div>
                    <div class="route-header-grid">
                        <div class="rh-field">
                            <label>Despacho</label>
                            <span class="estado-pill ${despachoPillClass}">${estadoDespacho}</span>
                        </div>
                        <div class="rh-field">
                            <label>Picking</label>
                            <span class="estado-pill ${pickingPillClass}">${estadoPicking} (${pickingPct}%)</span>
                        </div>
                        <div class="rh-field">
                            <label>Peso Estimado</label>
                            <div class="value">${formatNum(ruta.PesoEstimado || 0)} kg</div>
                        </div>
                        <div class="rh-field">
                            <label>Documentos</label>
                            <div class="value">${docsFinalizados}/${docs.length}</div>
                        </div>
                    </div>
                    <div class="picking-bar-lg">
                        <div class="fill ${pickingComplete ? 'complete' : 'in-progress'}" style="width:${pickingPct}%"></div>
                    </div>
                    <div class="route-header-actions">${actionsHtml}</div>
                </div>

                <div class="docs-header">
                    <i class="bi bi-file-earmark-text" style="color:var(--primary)"></i>
                    Documentos
                    <span class="badge-count">${docs.length}</span>
                </div>

                <div id="docsList">
                    ${docs.map(d => renderDocCard(ruta.RouteNumber, d)).join('')}
                </div>
            `;
        }

        function renderDocCard(routeNumber, d) {
            const isDone = d.Estado === 'Finalizado';
            const isOpen = openDocs.has(d.OV_Number);

            return `
                <div class="doc-card">
                    <div class="doc-card-header" onclick="toggleDoc('${routeNumber}', '${esc(d.OV_Number)}')">
                        <div class="doc-icon ${isDone ? 'done' : 'pending'}">
                            <i class="bi bi-${isDone ? 'check-circle-fill' : 'circle'}"></i>
                        </div>
                        <div class="doc-info">
                            <div class="doc-name">${esc(d.OV_Number)} <span style="font-size:0.72rem;color:#999;font-weight:400">(${esc(d.DocType)})</span></div>
                            <div class="doc-meta">${d.TotalProductos} producto${d.TotalProductos !== 1 ? 's' : ''} · ${d.ProductosFinalizados}/${d.TotalProductos} completados</div>
                        </div>
                        <div class="doc-right">
                            <div class="doc-weight">${formatNum(d.PesoTotal || 0)} kg</div>
                            <div class="doc-status"><span class="estado-pill ${isDone ? 'picking-finalizado' : 'picking-iniciado'}" style="font-size:0.6rem">${d.Estado}</span></div>
                        </div>
                        <i class="bi bi-chevron-right doc-toggle ${isOpen ? 'open' : ''}"></i>
                    </div>
                    <div class="doc-products ${isOpen ? 'open' : ''}" id="doc-${d.OV_Number}"></div>
                </div>
            `;
        }

        async function toggleDoc(routeNumber, ovNumber) {
            const el = document.getElementById('doc-' + ovNumber);
            if (!el) return;

            if (openDocs.has(ovNumber)) {
                openDocs.delete(ovNumber);
                el.classList.remove('open');
                el.innerHTML = '';
                return;
            }

            openDocs.add(ovNumber);
            el.classList.add('open');
            el.innerHTML = '<div style="padding:0.3rem 0;font-size:0.72rem;color:#aaa"><i class="bi bi-hourglass-split"></i> Cargando...</div>';

            try {
                const res = await fetch('/api/despacho/rutas/' + routeNumber + '/documentos/' + encodeURIComponent(ovNumber) + '/productos');
                const productos = await res.json();

                el.innerHTML = productos.map(p => {
                    const pDone = p.Estado === 'Finalizado';
                    const qty = pDone ? '✓' : p.CantidadPendiente + '/' + p.Cantidad;
                    return `
                        <div class="prod-row">
                            <div class="prod-icon ${pDone ? 'done' : 'pending'}">
                                <i class="bi bi-${pDone ? 'check-circle-fill' : 'circle'}"></i>
                            </div>
                            <div class="prod-name" title="${esc(p.ProductName || '')}">${esc(p.Product)} — ${esc(p.ProductName || '')}</div>
                            <div class="prod-qty ${pDone ? 'done' : ''}">${qty}</div>
                        </div>
                    `;
                }).join('');
            } catch (err) {
                el.innerHTML = '<div style="padding:0.3rem 0;font-size:0.72rem;color:#c62828">Error</div>';
            }
        }

        async function cambiarEstado(routeNumber, estado) {
            const labels = {
                'Listo para Carga': 'marcar como Listo para Carga',
                'Finalizado': 'finalizar el despacho de',
                'Pendiente': 'revertir a Pendiente'
            };
            if (!confirm(`Confirmar: ${labels[estado]} ruta #${routeNumber}?`)) return;

            try {
                const res = await fetch('/api/despacho/estado', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ routeNumber, estado })
                });
                const data = await res.json();
                if (!res.ok) { alert(data.error || 'Error'); return; }
                await loadDespacho();
                if (estado !== 'Finalizado') {
                    await selectRoute(routeNumber);
                } else {
                    document.getElementById('panelDetail').innerHTML = '<div class="empty-detail"><i class="bi bi-check-circle"></i><p>Despacho finalizado</p></div>';
                    selectedRoute = null;
                }
            } catch (err) {
                alert('Error de conexion');
            }
        }

        // ── Order mode functions ──

        async function selectRouteOrder(idRoutePlan, routeNumber) {
            selectedRoutePlanId = idRoutePlan;
            selectedRoute = null;
            openDocs = new Set();
            renderCarriles();

            const panel = document.getElementById('panelDetail');
            panel.innerHTML = '<div class="loading-detail"><i class="bi bi-hourglass-split"></i> Cargando...</div>';

            const ruta = despachoData.find(r => r.ID_RoutePlan === idRoutePlan);
            if (!ruta) return;

            try {
                const res = await fetch('/api/order/despacho/rutas/' + idRoutePlan + '/documentos');
                if (!res.ok) {
                    const errData = await res.json().catch(() => ({}));
                    throw new Error(errData.error || 'HTTP ' + res.status);
                }
                const docs = await res.json();
                renderDetailOrder(ruta, docs);
            } catch (err) {
                console.error('Error cargando documentos order:', err);
                panel.innerHTML = '<div class="loading-detail" style="color:#c62828"><i class="bi bi-exclamation-triangle"></i> Error: ' + esc(err.message) + '</div>';
            }
        }

        function renderDetailOrder(ruta, docs) {
            const panel = document.getElementById('panelDetail');
            const estadoDespacho = ruta.EstadoDespacho || 'Pendiente';
            const estadoPicking = ruta.Estado || 'Iniciado';
            const totalPedidos = ruta.TotalPedidos || 0;
            const pedidosFin = ruta.PedidosFinalizados || 0;
            const pickingPct = totalPedidos > 0 ? Math.round((pedidosFin / totalPedidos) * 100) : 0;
            const pickingComplete = estadoPicking === 'Finalizado';

            let despachoPillClass = 'pendiente';
            if (estadoDespacho === 'Listo para Carga') despachoPillClass = 'listo-carga';
            if (estadoDespacho === 'Finalizado') despachoPillClass = 'finalizado-despacho';

            let pickingPillClass = pickingComplete ? 'picking-finalizado' : 'picking-iniciado';

            let actionsHtml = '';
            if (estadoDespacho === 'Pendiente') {
                actionsHtml = `
                    <button class="btn-estado btn-listo" ${pickingComplete ? '' : 'disabled title="Picking no finalizado"'} onclick="cambiarEstadoOrder(${ruta.ID_RoutePlan}, ${ruta.RouteNumber}, 'Listo para Carga')">
                        <i class="bi bi-check2-square"></i> Marcar Listo para Carga
                    </button>`;
            } else if (estadoDespacho === 'Listo para Carga') {
                actionsHtml = `
                    <button class="btn-estado btn-finalizar-despacho" onclick="cambiarEstadoOrder(${ruta.ID_RoutePlan}, ${ruta.RouteNumber}, 'Finalizado')">
                        <i class="bi bi-truck"></i> Finalizar Despacho
                    </button>
                    <button class="btn-estado btn-revertir" onclick="cambiarEstadoOrder(${ruta.ID_RoutePlan}, ${ruta.RouteNumber}, 'Pendiente')">
                        <i class="bi bi-arrow-counterclockwise"></i> Revertir
                    </button>`;
            }

            const docsFinalizados = docs.filter(d => d.Estado === 'Finalizado').length;

            panel.innerHTML = `
                <div class="route-header-card">
                    <div class="route-header-top">
                        <div>
                            <div class="route-header-title">#${ruta.RouteNumber} — ${esc(ruta.RouteName || '')} ${ruta.Pais ? '<span style="font-size:0.7rem;background:rgba(212,168,38,0.2);color:#b8941f;padding:0.1rem 0.4rem;border-radius:4px;margin-left:0.4rem">' + ruta.Pais + '</span>' : ''}</div>
                            <div class="route-header-subtitle"><i class="bi bi-signpost-2" style="color:var(--primary)"></i> ${esc(ruta.CarrilNombre || 'Sin carril')}</div>
                        </div>
                    </div>
                    <div class="route-header-grid">
                        <div class="rh-field">
                            <label>Despacho</label>
                            <span class="estado-pill ${despachoPillClass}">${estadoDespacho}</span>
                        </div>
                        <div class="rh-field">
                            <label>Picking</label>
                            <span class="estado-pill ${pickingPillClass}">${estadoPicking} (${pickingPct}%)</span>
                        </div>
                        <div class="rh-field">
                            <label>Peso Estimado</label>
                            <div class="value">${formatNum(ruta.PesoEstimado || 0)} kg</div>
                        </div>
                        <div class="rh-field">
                            <label>Pedidos</label>
                            <div class="value">${docsFinalizados}/${docs.length}</div>
                        </div>
                    </div>
                    <div class="picking-bar-lg">
                        <div class="fill ${pickingComplete ? 'complete' : 'in-progress'}" style="width:${pickingPct}%"></div>
                    </div>
                    <div class="route-header-actions">${actionsHtml}</div>
                </div>

                <div class="docs-header">
                    <i class="bi bi-receipt" style="color:var(--primary)"></i>
                    Pedidos
                    <span class="badge-count">${docs.length}</span>
                </div>

                <div id="docsList">
                    ${docs.map(d => renderDocCardOrder(d)).join('')}
                </div>
            `;
        }

        function renderDocCardOrder(d) {
            const isDone = d.Estado === 'Finalizado';
            const linFin = d.LineasFinalizadas || 0;
            const linTotal = d.TotalLineas || 0;

            return `
                <div class="doc-card">
                    <div class="doc-card-header">
                        <div class="doc-icon ${isDone ? 'done' : 'pending'}">
                            <i class="bi bi-${isDone ? 'check-circle-fill' : 'circle'}"></i>
                        </div>
                        <div class="doc-info">
                            <div class="doc-name">${esc(d.OV_Number)} <span style="font-size:0.72rem;color:#999;font-weight:400">(${esc(d.DocType)})</span></div>
                            <div class="doc-meta">${linTotal} lineas · ${linFin}/${linTotal} completadas${d.OperarioNombre ? ' · <strong style="color:var(--success)">' + esc(d.OperarioNombre) + '</strong>' : ''}</div>
                        </div>
                        <div class="doc-right">
                            <div class="doc-weight">${formatNum(d.PesoTotal || 0)} kg</div>
                            <div class="doc-status"><span class="estado-pill ${isDone ? 'picking-finalizado' : 'picking-iniciado'}" style="font-size:0.6rem">${d.Estado || 'Pendiente'}</span></div>
                        </div>
                    </div>
                </div>
            `;
        }

        async function cambiarEstadoOrder(idRoutePlan, routeNumber, estado) {
            const labels = {
                'Listo para Carga': 'marcar como Listo para Carga',
                'Finalizado': 'finalizar el despacho de',
                'Pendiente': 'revertir a Pendiente'
            };
            if (!confirm(`Confirmar: ${labels[estado]} ruta #${routeNumber}?`)) return;

            try {
                const res = await fetch('/api/order/despacho/estado', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ idRoutePlan, estado })
                });
                const data = await res.json();
                if (!res.ok) { alert(data.error || 'Error'); return; }
                await loadDespacho();
                if (estado !== 'Finalizado') {
                    await selectRouteOrder(idRoutePlan, routeNumber);
                } else {
                    document.getElementById('panelDetail').innerHTML = '<div class="empty-detail"><i class="bi bi-check-circle"></i><p>Despacho finalizado</p></div>';
                    selectedRoutePlanId = null;
                }
            } catch (err) {
                alert('Error de conexion');
            }
        }

        function esc(str) {
            if (!str) return '';
            const d = document.createElement('div');
            d.textContent = str;
            return d.innerHTML;
        }

        function formatNum(n) {
            return parseFloat(n || 0).toLocaleString('es-GT', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
        }

        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
