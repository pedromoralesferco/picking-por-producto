<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Despacho - Picking por Producto</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <style>
        :root {
            --primary: #d4a826;
            --primary-dark: #b8941f;
            --dark: #222222;
            --dark-light: #2d2d2d;
            --success: #2e7d32;
            --danger: #c62828;
            --blue: #1565c0;
            --bg: #f5f5f5;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            min-height: 100vh;
        }

        .header {
            background: var(--dark);
            color: white;
            padding: 0.8rem 1.5rem;
            box-shadow: 0 2px 8px rgba(0,0,0,0.3);
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 3px solid var(--primary);
        }

        .header .brand { font-size: 0.75rem; font-weight: 800; letter-spacing: 2px; color: var(--primary); }
        .header h1 { font-size: 1.1rem; font-weight: 700; }
        .header h1 i { color: var(--primary); }

        .btn-link {
            background: transparent; border: 1px solid #555; color: #ccc;
            padding: 0.35rem 0.7rem; border-radius: 6px; cursor: pointer;
            font-size: 0.8rem; text-decoration: none; transition: all 0.2s;
        }
        .btn-link:hover { background: #444; color: white; }

        .toolbar {
            max-width: 100%;
            margin: 0.8rem 1.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 1rem;
        }

        .toolbar h3 { font-size: 1rem; font-weight: 700; color: var(--dark); }

        .toolbar select {
            padding: 0.4rem 0.7rem; border: 2px solid #e0e0e0;
            border-radius: 8px; font-size: 0.85rem; outline: none;
        }
        .toolbar select:focus { border-color: var(--primary); }

        .refresh-info { font-size: 0.75rem; color: #999; }

        /* ── Carriles horizontales ── */
        .carriles-container {
            padding: 0 1.5rem 1.5rem;
        }

        .carril-row {
            background: white;
            border-radius: 12px;
            margin-bottom: 0.6rem;
            box-shadow: 0 1px 6px rgba(0,0,0,0.05);
            overflow: hidden;
        }

        .carril-row-header {
            background: var(--dark);
            color: white;
            padding: 0.5rem 1rem;
            display: flex;
            align-items: center;
            gap: 0.6rem;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
        }

        .carril-row-header h4 {
            font-size: 0.85rem;
            font-weight: 700;
            flex: 1;
        }

        .carril-row-header h4 i { color: var(--primary); margin-right: 0.3rem; }

        .carril-row-header .badge-count {
            background: var(--primary); color: var(--dark);
            padding: 0.1rem 0.45rem; border-radius: 8px;
            font-size: 0.7rem; font-weight: 700;
        }

        .carril-row-header .toggle-icon {
            color: #888; font-size: 0.9rem; transition: transform 0.2s;
        }

        .carril-row-header .toggle-icon.open { transform: rotate(90deg); }

        .carril-row-body {
            display: none;
            padding: 0.5rem;
        }

        .carril-row-body.open { display: flex; flex-wrap: wrap; gap: 0.5rem; }

        /* ── Route items compactos con color-code ── */
        .route-item {
            border-radius: 8px;
            padding: 0.5rem 0.7rem;
            min-width: 220px;
            flex: 0 0 auto;
            transition: all 0.15s;
            border: 1px solid transparent;
        }

        .route-item.estado-pendiente {
            background: rgba(212,168,38,0.1);
            border-color: rgba(212,168,38,0.25);
        }

        .route-item.estado-listo {
            background: rgba(46,125,50,0.08);
            border-color: rgba(46,125,50,0.25);
        }

        .route-item.estado-finalizado {
            background: rgba(21,101,192,0.08);
            border-color: rgba(21,101,192,0.2);
            opacity: 0.7;
        }

        .ri-title {
            font-weight: 700;
            font-size: 0.82rem;
            color: var(--dark);
            margin-bottom: 0.15rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .ri-meta {
            font-size: 0.72rem;
            color: #777;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-bottom: 0.3rem;
        }

        .picking-bar {
            height: 4px;
            background: #e8e8e8;
            border-radius: 2px;
            overflow: hidden;
            margin-bottom: 0.3rem;
        }

        .picking-bar .fill {
            height: 100%;
            border-radius: 2px;
            transition: width 0.3s;
        }

        .picking-bar .fill.complete { background: var(--success); }
        .picking-bar .fill.in-progress { background: var(--primary); }

        .ri-actions {
            display: flex;
            gap: 0.3rem;
        }

        .btn-estado {
            padding: 0.2rem 0.5rem;
            border-radius: 5px;
            font-size: 0.68rem;
            font-weight: 600;
            cursor: pointer;
            border: none;
            transition: opacity 0.2s;
        }

        .btn-estado:hover { opacity: 0.85; }
        .btn-estado:disabled { opacity: 0.35; cursor: not-allowed; }

        .btn-listo { background: var(--success); color: white; }
        .btn-finalizar-despacho { background: var(--blue); color: white; }
        .btn-revertir { background: #eee; color: #666; border: 1px solid #ddd; }

        /* ── Detalle expandible ── */
        .route-item { cursor: pointer; }

        .ri-detail {
            display: none;
            margin-top: 0.4rem;
            padding-top: 0.4rem;
            border-top: 1px dashed #ddd;
        }

        .ri-detail.open { display: block; }

        .ri-detail-loading {
            font-size: 0.72rem;
            color: #aaa;
            padding: 0.3rem 0;
        }

        .doc-row {
            display: flex;
            align-items: center;
            padding: 0.25rem 0;
            gap: 0.5rem;
            font-size: 0.72rem;
            border-bottom: 1px solid rgba(0,0,0,0.04);
        }

        .doc-row:last-child { border-bottom: none; }

        .doc-row .doc-icon {
            font-size: 0.85rem;
            flex-shrink: 0;
        }

        .doc-row .doc-icon.done { color: var(--success); }
        .doc-row .doc-icon.pending { color: #ccc; }

        .doc-row .doc-info {
            flex: 1;
            min-width: 0;
        }

        .doc-row .doc-name {
            font-weight: 600;
            color: #333;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .doc-row .doc-desc {
            color: #999;
            font-size: 0.68rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .doc-row .doc-qty {
            text-align: right;
            flex-shrink: 0;
            font-weight: 600;
            color: #555;
        }

        .doc-row .doc-qty .done-label {
            color: var(--success);
            font-size: 0.65rem;
        }

        .doc-summary {
            font-size: 0.7rem;
            color: #888;
            padding: 0.3rem 0 0.1rem;
            font-weight: 600;
        }

        .no-data {
            text-align: center; padding: 4rem 2rem; color: #999;
        }
        .no-data i { font-size: 3rem; display: block; margin-bottom: 0.8rem; opacity: 0.4; }

        .loading { text-align: center; padding: 3rem; color: #999; }

        @media (max-width: 600px) {
            .carril-row-body.open { flex-direction: column; }
            .route-item { min-width: 100%; }
            .toolbar { flex-wrap: wrap; }
        }
    </style>
</head>
<body>
    <div class="header">
        <div>
            <div class="brand">FERCO CERAMICA</div>
            <h1><i class="bi bi-truck"></i> Gestion de Despacho</h1>
        </div>
        <div style="display:flex;align-items:center;gap:0.6rem">
            <a href="/dashboard" class="btn-link"><i class="bi bi-arrow-left"></i> Dashboard</a>
        </div>
    </div>

    <div class="toolbar">
        <h3><i class="bi bi-funnel" style="color:var(--primary)"></i> Despacho</h3>
        <div style="display:flex;align-items:center;gap:1rem">
            <select id="centroFilter" onchange="renderDespacho()">
                <option value="">Todos los centros</option>
            </select>
            <span class="refresh-info">Auto-refresh: 30s</span>
        </div>
    </div>

    <div class="loading" id="loading"><p>Cargando...</p></div>
    <div class="no-data" id="noData" style="display:none">
        <i class="bi bi-truck"></i>
        <p>No hay rutas pendientes de despacho</p>
    </div>
    <div class="carriles-container" id="carrilesContainer" style="display:none"></div>

    <script>
        let despachoData = [];
        let allCarriles = [];
        let refreshTimer = null;
        let openCarriles = new Set();

        async function init() {
            try {
                const res = await fetch('/api/auth/me');
                if (!res.ok) { window.location.href = '/login'; return; }
            } catch { window.location.href = '/login'; return; }

            await loadCentros();
            await loadAllCarriles();
            await loadDespacho();
            refreshTimer = setInterval(loadDespacho, 30000);
        }

        async function loadCentros() {
            try {
                const res = await fetch('/api/centros');
                const centros = await res.json();
                const select = document.getElementById('centroFilter');
                centros.forEach(c => {
                    const opt = document.createElement('option');
                    opt.value = c.ID_Centro;
                    opt.textContent = `${c.Nombre} (${c.Pais})`;
                    select.appendChild(opt);
                });
            } catch (err) { console.error(err); }
        }

        async function loadAllCarriles() {
            try {
                const res = await fetch('/api/carriles');
                allCarriles = await res.json();
                // Open all carriles by default
                allCarriles.forEach(c => openCarriles.add(c.ID_Carril));
            } catch (err) { console.error(err); }
        }

        async function loadDespacho() {
            try {
                const res = await fetch('/api/despacho/rutas');
                despachoData = await res.json();
                renderDespacho();
            } catch (err) { console.error(err); }
        }

        function renderDespacho() {
            document.getElementById('loading').style.display = 'none';
            const container = document.getElementById('carrilesContainer');
            const noData = document.getElementById('noData');

            const centroFilter = document.getElementById('centroFilter').value;

            // Filter carriles by centro
            let carriles = allCarriles;
            let routes = despachoData;
            if (centroFilter) {
                carriles = carriles.filter(c => c.ID_Centro == centroFilter);
                routes = routes.filter(r => r.ID_Centro == centroFilter);
            }

            // Only show carriles that have routes
            const carrilesWithRoutes = new Set(routes.map(r => r.ID_Carril));

            if (carrilesWithRoutes.size === 0) {
                container.style.display = 'none';
                noData.style.display = 'block';
                return;
            }

            noData.style.display = 'none';
            container.style.display = 'block';

            // Group routes by carril
            const groups = {};
            routes.forEach(r => {
                const key = r.ID_Carril || 0;
                if (!groups[key]) groups[key] = [];
                groups[key].push(r);
            });

            // Render carriles that have routes
            const sortedCarriles = carriles.filter(c => carrilesWithRoutes.has(c.ID_Carril));

            container.innerHTML = sortedCarriles.map(carril => {
                const routeList = groups[carril.ID_Carril] || [];
                const isOpen = openCarriles.has(carril.ID_Carril);

                return `
                    <div class="carril-row">
                        <div class="carril-row-header" onclick="toggleCarril(${carril.ID_Carril})">
                            <h4><i class="bi bi-signpost-2"></i> ${esc(carril.Nombre)}</h4>
                            <span class="badge-count">${routeList.length}</span>
                            <i class="bi bi-chevron-right toggle-icon ${isOpen ? 'open' : ''}"></i>
                        </div>
                        <div class="carril-row-body ${isOpen ? 'open' : ''}">
                            ${routeList.map(r => renderRouteItem(r)).join('')}
                        </div>
                    </div>
                `;
            }).join('');
        }

        function renderRouteItem(r) {
            const estadoDespacho = r.EstadoDespacho || 'Pendiente';
            const estadoPicking = r.Estado || 'Iniciado';
            const pickingPct = r.TotalProductos > 0 ? Math.round((r.ProductosFinalizados / r.TotalProductos) * 100) : 0;
            const pickingComplete = estadoPicking === 'Finalizado';

            let estadoClass = 'estado-pendiente';
            if (estadoDespacho === 'Listo para Carga') estadoClass = 'estado-listo';
            if (estadoDespacho === 'Finalizado') estadoClass = 'estado-finalizado';

            let actionsHtml = '';
            if (estadoDespacho === 'Pendiente') {
                actionsHtml = `
                    <button class="btn-estado btn-listo" ${pickingComplete ? '' : 'disabled title="Picking no finalizado"'} onclick="event.stopPropagation();cambiarEstado(${r.RouteNumber}, 'Listo para Carga')">
                        <i class="bi bi-check2-square"></i> Listo
                    </button>`;
            } else if (estadoDespacho === 'Listo para Carga') {
                actionsHtml = `
                    <button class="btn-estado btn-finalizar-despacho" onclick="event.stopPropagation();cambiarEstado(${r.RouteNumber}, 'Finalizado')">
                        <i class="bi bi-truck"></i> Despachar
                    </button>
                    <button class="btn-estado btn-revertir" onclick="event.stopPropagation();cambiarEstado(${r.RouteNumber}, 'Pendiente')">
                        <i class="bi bi-arrow-counterclockwise"></i>
                    </button>`;
            }

            return `
                <div class="route-item ${estadoClass}" onclick="toggleRouteDetail(this, ${r.RouteNumber})">
                    <div class="ri-title">#${r.RouteNumber} — ${esc(r.RouteName || '')}</div>
                    <div class="ri-meta">
                        <span><i class="bi bi-box-seam"></i> ${formatNum(r.PesoEstimado || 0)} kg</span>
                        <span>Picking: ${pickingPct}%</span>
                    </div>
                    <div class="picking-bar">
                        <div class="fill ${pickingComplete ? 'complete' : 'in-progress'}" style="width:${pickingPct}%"></div>
                    </div>
                    <div class="ri-actions">${actionsHtml}</div>
                    <div class="ri-detail" id="detail-${r.RouteNumber}"></div>
                </div>
            `;
        }

        function toggleCarril(id) {
            if (openCarriles.has(id)) openCarriles.delete(id);
            else openCarriles.add(id);
            renderDespacho();
        }

        async function toggleRouteDetail(el, routeNumber) {
            const detail = document.getElementById('detail-' + routeNumber);
            if (!detail) return;

            if (detail.classList.contains('open')) {
                detail.classList.remove('open');
                return;
            }

            detail.classList.add('open');
            detail.innerHTML = '<div class="ri-detail-loading"><i class="bi bi-hourglass-split"></i> Cargando documentos...</div>';

            try {
                const res = await fetch('/api/rutas/' + routeNumber + '/productos');
                const productos = await res.json();

                if (productos.length === 0) {
                    detail.innerHTML = '<div class="ri-detail-loading">Sin productos</div>';
                    return;
                }

                const finalizados = productos.filter(p => p.Estado === 'Finalizado').length;

                detail.innerHTML = `
                    <div class="doc-summary">${finalizados}/${productos.length} productos finalizados</div>
                    ${productos.map(p => {
                        const isDone = p.Estado === 'Finalizado';
                        return `
                            <div class="doc-row">
                                <div class="doc-icon ${isDone ? 'done' : 'pending'}">
                                    <i class="bi bi-${isDone ? 'check-circle-fill' : 'circle'}"></i>
                                </div>
                                <div class="doc-info">
                                    <div class="doc-name">${esc(p.Product)}</div>
                                    <div class="doc-desc">${esc(p.ProductName || '')}${p.PickerNombre ? ' · ' + esc(p.PickerNombre) : ''}</div>
                                </div>
                                <div class="doc-qty">
                                    ${isDone ? '<span class="done-label">✓</span>' : (p.TotalArticulo || 0) + ' art.'}
                                    <div style="font-size:0.65rem;color:#999">${formatNum(p.PesoTotal || 0)} kg</div>
                                </div>
                            </div>
                        `;
                    }).join('')}
                `;
            } catch (err) {
                detail.innerHTML = '<div class="ri-detail-loading" style="color:#c62828">Error al cargar</div>';
            }
        }

        async function cambiarEstado(routeNumber, estado) {
            const labels = {
                'Listo para Carga': 'marcar como Listo para Carga',
                'Finalizado': 'finalizar el despacho de',
                'Pendiente': 'revertir a Pendiente'
            };
            if (!confirm(`Confirmar: ${labels[estado]} la ruta #${routeNumber}?`)) return;

            try {
                const res = await fetch('/api/despacho/estado', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ routeNumber, estado })
                });
                const data = await res.json();
                if (!res.ok) { alert(data.error || 'Error'); return; }
                await loadDespacho();
            } catch (err) {
                alert('Error de conexion');
            }
        }

        function esc(str) {
            if (!str) return '';
            const d = document.createElement('div');
            d.textContent = str;
            return d.innerHTML;
        }

        function formatNum(n) {
            return parseFloat(n || 0).toLocaleString('es-GT', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
        }

        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
