<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Planificador de Rutas - Zona 5</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <style>
        :root {
            --primary: #d4a826; --primary-dark: #b8941f;
            --dark: #222222; --dark-light: #2d2d2d;
            --success: #2e7d32; --danger: #c62828; --warn: #ef6c00;
            --bg: #f5f5f5;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--bg); min-height: 100vh; color: #333; }

        .navbar-app {
            background: var(--dark); color: white; padding: 0.7rem 1.3rem;
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 3px solid var(--primary); box-shadow: 0 2px 8px rgba(0,0,0,.3);
        }
        .navbar-app .brand { display: flex; align-items: center; gap: .6rem; font-weight: 700; font-size: 1rem; }
        .navbar-app .brand i { color: var(--primary); font-size: 1.2rem; }
        .navbar-app a { color: #ccc; text-decoration: none; font-size: .85rem; display: flex; align-items: center; gap: .3rem; }
        .navbar-app a:hover { color: var(--primary); }

        /* Toolbar */
        .toolbar {
            display: flex; align-items: center; gap: 1rem; flex-wrap: wrap;
            padding: 1rem 1.5rem; background: white; border-bottom: 1px solid #e5e5e5;
        }
        .toolbar h1 { font-size: 1.1rem; font-weight: 700; margin-right: auto; }
        .toolbar h1 i { color: var(--warn); }
        .field { display: flex; align-items: center; gap: .4rem; font-size: .85rem; color: #666; }
        .field input[type=date] { padding: .4rem .6rem; border: 1px solid #ccc; border-radius: 6px; font-size: .85rem; }

        .btn { border: none; border-radius: 8px; font-weight: 600; cursor: pointer; display: inline-flex; align-items: center; gap: .4rem; padding: .55rem 1.1rem; font-size: .88rem; }
        .btn-primary { background: var(--primary); color: #222; }
        .btn-primary:hover { background: var(--primary-dark); }
        .btn-plan { background: var(--warn); color: white; width: 100%; justify-content: center; padding: .7rem; font-size: .95rem; }
        .btn-plan:hover { background: #d35f00; }
        .btn:disabled { opacity: .5; cursor: not-allowed; }

        /* Summary chips */
        .chips { display: flex; gap: .7rem; flex-wrap: wrap; padding: 1rem 1.5rem 0; }
        .chip { background: white; border: 1px solid #e5e5e5; border-radius: 10px; padding: .6rem .9rem; display: flex; align-items: center; gap: .55rem; box-shadow: 0 1px 3px rgba(0,0,0,.05); }
        .chip i { font-size: 1.3rem; color: var(--primary); }
        .chip .n { font-size: 1.15rem; font-weight: 800; line-height: 1; }
        .chip .l { font-size: .7rem; color: #888; text-transform: uppercase; letter-spacing: .5px; }

        /* Layout */
        .layout { display: grid; grid-template-columns: 260px 1fr; gap: 1.2rem; padding: 1.2rem 1.5rem; align-items: start; }
        @media (max-width: 900px) { .layout { grid-template-columns: 1fr; } }
        .card { background: white; border: 1px solid #e9e9e9; border-radius: 12px; box-shadow: 0 1px 4px rgba(0,0,0,.05); overflow: hidden; }
        .card-h { padding: .8rem 1rem; border-bottom: 1px solid #eee; font-weight: 700; font-size: .9rem; display: flex; align-items: center; gap: .5rem; }
        .card-h i { color: var(--warn); }
        .card-b { padding: 1rem; }

        /* Fleet */
        .fleet-row { display: flex; align-items: center; justify-content: space-between; padding: .55rem 0; border-bottom: 1px dashed #eee; }
        .fleet-row:last-child { border-bottom: none; }
        .fleet-row .cap { font-weight: 700; font-size: .9rem; }
        .fleet-row .cap small { color: #999; font-weight: 400; display: block; font-size: .68rem; }
        .stepper { display: flex; align-items: center; gap: .3rem; }
        .stepper button { width: 26px; height: 26px; border: 1px solid #ddd; background: #fafafa; border-radius: 6px; cursor: pointer; font-weight: 700; color: #555; }
        .stepper button:hover { background: #f0f0f0; }
        .stepper input { width: 42px; text-align: center; border: 1px solid #ddd; border-radius: 6px; padding: .3rem; font-size: .85rem; }
        .libre { font-size: .72rem; color: #666; display: flex; align-items: center; gap: .3rem; cursor: pointer; }
        .fleet-note { font-size: .72rem; color: #999; margin-top: .7rem; line-height: 1.4; }

        /* Empty / loading */
        .empty { text-align: center; padding: 4rem 1rem; color: #999; }
        .empty i { font-size: 3rem; color: #ddd; display: block; margin-bottom: 1rem; }
        .empty p { margin-bottom: 1.2rem; }
        .spinner { text-align: center; padding: 3rem; color: #999; }
        .spinner i { font-size: 2rem; animation: spin 1s linear infinite; display: inline-block; color: var(--warn); }
        @keyframes spin { to { transform: rotate(360deg); } }
        .errbox { background: #fdecea; color: var(--danger); border: 1px solid #f5c6c0; border-radius: 8px; padding: 1rem; font-size: .85rem; margin: 1rem; }
        .info-banner { background: #fff8f2; border: 1px dashed #f6c6a8; color: var(--warn); border-radius: 8px; padding: .7rem .9rem; font-size: .8rem; margin: 1rem 1rem 0; display: flex; align-items: center; gap: .5rem; }

        /* Grid / tabla */
        .grid-wrap { overflow-x: auto; }
        table.grid { width: 100%; border-collapse: collapse; font-size: .82rem; }
        table.grid th { text-align: left; background: #fafafa; color: #777; font-size: .68rem; text-transform: uppercase; letter-spacing: .5px; padding: .55rem .7rem; border-bottom: 2px solid #eee; white-space: nowrap; position: sticky; top: 0; z-index: 1; }
        table.grid td { padding: .5rem .7rem; border-bottom: 1px solid #f2f2f2; vertical-align: top; }
        table.grid tr:hover td { background: #fcfaf5; }
        .c-doc b { display: block; font-variant-numeric: tabular-nums; }
        .c-doc small { color: #999; }
        .tipo { background: #eef2ff; color: #3949ab; border-radius: 5px; padding: .1rem .45rem; font-size: .7rem; font-weight: 700; }
        .c-fecha { white-space: nowrap; color: #555; font-variant-numeric: tabular-nums; }
        .c-dir { min-width: 200px; max-width: 300px; color: #444; }
        .c-com { min-width: 220px; max-width: 340px; color: #666; font-size: .78rem; }
        .c-vend { white-space: nowrap; color: #555; }
        .muted { color: #bbb; }

        /* Plan (rutas sugeridas) */
        .okbox { background:#eaf5ea; border:1px solid #c3e3c3; color:#2e7d32; border-radius:8px; padding:.6rem .9rem; margin:1rem 1rem 0; font-size:.82rem; }
        .warnbox { background:#fdf1e7; border:1px solid #f6c6a8; color:var(--warn); border-radius:8px; padding:.6rem .9rem; margin:1rem 1rem 0; font-size:.8rem; }
        .warnbox ul { margin:.3rem 0 0 1.1rem; }
        .notas { margin:.6rem 1rem 0; font-size:.78rem; color:#777; font-style:italic; }
        .plan-section { font-size:.78rem; font-weight:800; text-transform:uppercase; letter-spacing:1px; color:#888; margin:1.1rem 1rem .5rem; }
        .route { border:1px solid #e9e9e9; border-radius:10px; margin:0 1rem .6rem; overflow:hidden; }
        .route.especial { border-color:#f6c6a8; background:#fff8f2; }
        .route.especial.danger { border-color:#f5c6c0; background:#fdecea; }
        .route-h { display:flex; align-items:center; gap:.7rem; padding:.6rem .9rem; background:#fafafa; cursor:pointer; }
        .route.especial .route-h { background:#fdf1e7; }
        .route.especial.danger .route-h { background:#fbe3e0; }
        .route-name { font-weight:700; font-size:.87rem; }
        .route-name small { color:#999; font-weight:400; display:block; font-size:.72rem; }
        .truck { background:#eef2ff; color:#3949ab; border-radius:6px; padding:.15rem .5rem; font-size:.72rem; font-weight:700; white-space:nowrap; }
        .route.especial .truck { background:#fdecdd; color:var(--warn); }
        .route-meta { margin-left:auto; text-align:right; font-size:.74rem; color:#888; white-space:nowrap; }
        .route-meta b { color:#333; }
        .usebar { height:5px; background:#eee; border-radius:3px; margin-top:.25rem; width:90px; margin-left:auto; overflow:hidden; }
        .usebar .fill { height:100%; background:var(--success); }
        .route-pts { max-height:0; overflow:hidden; transition:max-height .2s ease; }
        .route.open .route-pts { max-height:600px; padding:.4rem .9rem .6rem; border-top:1px solid #f0f0f0; }
        .rpt { display:flex; gap:.6rem; padding:.32rem 0; font-size:.82rem; border-bottom:1px dashed #f2f2f2; }
        .rpt:last-child { border-bottom:none; }
        .rpt .z { background:#f0f0f0; color:#666; border-radius:5px; padding:.1rem .4rem; font-size:.68rem; font-weight:700; min-width:56px; text-align:center; }
        .rpt .cli { flex:1; }
        .rpt .pw { color:#666; white-space:nowrap; }

        /* Detalle de punto (todos los campos) + arrastrar/soltar */
        .route-pts.abierto { max-height:none; overflow:visible; padding:.4rem .9rem .7rem; border-top:1px solid #f0f0f0; }
        .rpt { cursor:grab; align-items:flex-start; gap:.5rem; }
        .rpt:active { cursor:grabbing; }
        .rpt .drag { color:#cfcfcf; padding-top:2px; }
        .rpt-main { flex:1; min-width:0; }
        .rpt-l1 { display:flex; gap:.5rem; align-items:baseline; }
        .rpt-l1 b { font-size:.84rem; }
        .rpt-l1 .pw { margin-left:auto; color:#555; white-space:nowrap; font-variant-numeric:tabular-nums; }
        .rpt-l2, .rpt-l3, .rpt-l4 { font-size:.72rem; margin-top:.12rem; word-break:break-word; }
        .rpt-l2 { color:#999; }
        .rpt-l3 { color:#555; }
        .rpt-l4 { color:#8a6d3b; }
        .route.route-bad { border-color:#f5c6c0; }
        .route.route-bad .route-h { background:#fbe3e0; }
        .route.dragover, .dropzone.dragover { outline:2px dashed var(--warn); outline-offset:-2px; }
        .dropzone { min-height:40px; margin:0 1rem .6rem; border:1px dashed #ddd; border-radius:8px; }
        .empty-drop { color:#bbb; font-size:.78rem; text-align:center; padding:.8rem; }
        .hint { font-size:.72rem; color:#999; margin:.3rem 1rem .5rem; display:flex; align-items:center; gap:.35rem; }

        /* Grid de rutas (vista tabular) */
        .plan-toolbar { display:flex; align-items:center; gap:.5rem; flex-wrap:wrap; margin:.6rem 1rem .2rem; }
        .plan-toolbar select { padding:.35rem .5rem; border:1px solid #ccc; border-radius:6px; font-size:.8rem; }
        .tb-l { font-size:.78rem; color:#888; }
        .btn-sm { padding:.4rem .7rem; font-size:.78rem; border:1px solid #ddd; background:#fafafa; border-radius:6px; cursor:pointer; display:inline-flex; gap:.3rem; align-items:center; }
        .btn-sm:hover { background:#f0f0f0; }
        .btn-new { border-color:#d4a826; color:#8a6d1f; background:#fdf7e6; }
        .btn-save { border-color:#2e7d32; color:#2e7d32; background:#eaf5ea; font-weight:700; }
        .btn-save:hover { background:#dcecdc; }
        .rgrid { margin:0 1rem .7rem; border:1px solid #e9e9e9; border-radius:10px; overflow:hidden; }
        .rgrid.bad { border-color:#f5c6c0; }
        .rgrid-h { display:flex; align-items:center; gap:.6rem; padding:.5rem .7rem; background:#fafafa; flex-wrap:wrap; }
        .rgrid.bad .rgrid-h { background:#fbe3e0; }
        .rname { font-weight:700; font-size:.86rem; border:1px solid transparent; border-radius:5px; padding:.2rem .35rem; background:transparent; min-width:150px; }
        .rname:hover, .rname:focus { border-color:#ddd; background:#fff; outline:none; }
        .rtruck { padding:.25rem .4rem; border:1px solid #ddd; border-radius:6px; font-size:.75rem; font-weight:700; background:#fff; }
        .rmeta { margin-left:auto; font-size:.76rem; color:#666; white-space:nowrap; display:flex; align-items:center; gap:.5rem; }
        .rmeta b { color:#333; }
        .rmeta .usebar { margin-left:0; }
        .rdel { border:none; background:none; color:#c0392b; cursor:pointer; font-size:.95rem; padding:0 .1rem; }
        table.pgrid { width:100%; border-collapse:collapse; font-size:.78rem; table-layout:fixed; }
        table.pgrid th { text-align:left; background:#fcfcfc; color:#999; font-size:.64rem; text-transform:uppercase; letter-spacing:.4px; padding:.4rem .55rem; border-bottom:1px solid #eee; white-space:nowrap; }
        table.pgrid td { padding:.4rem .55rem; border-bottom:1px solid #f4f4f4; vertical-align:top; overflow-wrap:anywhere; word-break:break-word; }
        table.pgrid tr:last-child td { border-bottom:none; }
        table.pgrid tbody tr[draggable] { cursor:grab; }
        .pg-cli b { display:block; }
        .pg-dir { color:#555; }
        .pg-com { color:#777; }
        .pg-pw { text-align:right; white-space:nowrap; font-variant-numeric:tabular-nums; }
        .pg-act button, .pg-act select { display:block; width:100%; box-sizing:border-box; font-size:.7rem; padding:.2rem .3rem; border:1px solid #ddd; border-radius:5px; background:#fff; margin-bottom:.25rem; }
        .pg-act button { cursor:pointer; }
        .pg-act button:hover { background:#f5f5f5; }

        .hidden { display: none !important; }

        /* Barra de acciones del grid de entrada */
        .grid-actions { display:flex; align-items:center; gap:.6rem; flex-wrap:wrap; margin:1rem 1rem .2rem; }
        .grid-actions .ga-l { font-size:.78rem; color:#888; margin-right:auto; }
        .tipo.tr { background:#e8f5e9; color:#2e7d32; }
        .tipo.rma { background:#fdecea; color:#c62828; }
        .tipo.envio { background:#fff3e0; color:#ef6c00; }
        tr.manual td { background:#fffdf5; }
        tr.manual:hover td { background:#fdf7e6; }
        .badge-man { background:#fdf7e6; color:#8a6d1f; border:1px solid #e8d38a; border-radius:5px; padding:.05rem .35rem; font-size:.62rem; font-weight:700; margin-left:.35rem; }
        .c-del { text-align:center; }
        .c-del button { border:none; background:none; color:#c0392b; cursor:pointer; font-size:.95rem; }

        /* Modal agregar documento */
        .modal-bg { position:fixed; inset:0; background:rgba(0,0,0,.45); display:flex; align-items:center; justify-content:center; z-index:50; padding:1rem; }
        .modal { background:#fff; border-radius:14px; width:100%; max-width:440px; box-shadow:0 12px 40px rgba(0,0,0,.3); overflow:hidden; }
        .modal-h { padding:.9rem 1.1rem; border-bottom:1px solid #eee; font-weight:700; font-size:.95rem; display:flex; align-items:center; gap:.5rem; }
        .modal-h i { color:var(--warn); }
        .modal-b { padding:1.1rem; display:flex; flex-direction:column; gap:.8rem; }
        .modal-b label { font-size:.75rem; color:#666; font-weight:600; display:block; margin-bottom:.25rem; }
        .modal-b input, .modal-b select, .modal-b textarea { width:100%; padding:.5rem .6rem; border:1px solid #ccc; border-radius:7px; font-size:.85rem; font-family:inherit; }
        .modal-b textarea { resize:vertical; min-height:52px; }
        .mrow { display:flex; gap:.7rem; }
        .mrow > div { flex:1; }
        .mhint { font-size:.72rem; color:#999; background:#f7f7f7; border-radius:7px; padding:.5rem .6rem; line-height:1.35; }
        .modal-f { padding:.8rem 1.1rem; border-top:1px solid #eee; display:flex; justify-content:flex-end; gap:.6rem; }
        .m-err { color:var(--danger); font-size:.78rem; min-height:1rem; }
    </style>
</head>
<body>
    <nav class="navbar-app">
        <div class="brand"><i class="bi bi-diagram-3"></i> Planificador de Rutas</div>
        <a href="/dashboard"><i class="bi bi-arrow-left"></i> Dashboard</a>
    </nav>

    <div class="toolbar">
        <h1><i class="bi bi-geo-alt-fill"></i> Zona 5 &mdash; Pendiente de planificar</h1>
        <label class="field"><i class="bi bi-calendar3"></i> Fecha de entrega
            <input type="date" id="fecha">
        </label>
        <button class="btn btn-primary" id="btnImportar" onclick="importar()"><i class="bi bi-download"></i> Importar rutas</button>
    </div>

    <div class="chips hidden" id="chips"></div>

    <div class="layout">
        <!-- Panel flota -->
        <div class="card" id="flotaCard" style="opacity:.5;pointer-events:none">
            <div class="card-h"><i class="bi bi-truck"></i> Flota disponible</div>
            <div class="card-b" id="fleet"></div>
            <div class="card-b" style="border-top:1px solid #eee;padding-top:.8rem">
                <button class="btn btn-plan" id="btnPlan" onclick="planificar()" disabled><i class="bi bi-stars"></i> Planificar</button>
            </div>
        </div>

        <!-- Resultado -->
        <div class="card">
            <div class="card-h"><i class="bi bi-table"></i> Documentos pendientes</div>
            <div id="result">
                <div class="empty" id="emptyState">
                    <i class="bi bi-inbox"></i>
                    <p>Importa las rutas pendientes para comenzar a planificar.</p>
                    <button class="btn btn-primary" onclick="importar()"><i class="bi bi-download"></i> Importar rutas</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal: agregar documento manual (reprogramaciones / reenvíos) -->
    <div class="modal-bg hidden" id="modalDoc">
      <div class="modal">
        <div class="modal-h"><i class="bi bi-file-earmark-plus"></i> Agregar documento</div>
        <div class="modal-b">
          <div class="mrow">
            <div>
              <label>Tipo</label>
              <select id="mTipo" onchange="onTipoChange()">
                <option value="OV">OV — Orden de venta</option>
                <option value="TR">TR — Traslado</option>
                <option value="RMA">RMA — Devolución</option>
                <option value="ENVIO">Envío</option>
              </select>
            </div>
            <div>
              <label>Número de documento</label>
              <input id="mNum" type="text" inputmode="numeric" placeholder="Ej. 200821499" autocomplete="off">
            </div>
          </div>

          <div id="mHintDoc" class="mhint">
            <i class="bi bi-info-circle"></i> El peso y la ubicación se toman del documento en SAP al planificar. Basta el número.
          </div>

          <div id="mManual" class="hidden">
            <div style="margin-bottom:.8rem"><label>Cliente</label><input id="mCliente" type="text" placeholder="Nombre del cliente"></div>
            <div style="margin-bottom:.8rem"><label>Dirección</label><textarea id="mDir" placeholder="Dirección de entrega (incluye zona/municipio/departamento)"></textarea></div>
            <div class="mrow">
              <div><label>Comentarios</label><textarea id="mCom" placeholder="Notas para la ruta"></textarea></div>
              <div style="max-width:130px"><label>Peso (kg)</label><input id="mPeso" type="number" min="0" step="1" placeholder="0"></div>
            </div>
          </div>

          <div class="m-err" id="mErr"></div>
        </div>
        <div class="modal-f">
          <button class="btn-sm" onclick="closeAddDoc()">Cancelar</button>
          <button class="btn-sm btn-new" onclick="addExtra()"><i class="bi bi-plus-lg"></i> Agregar al grid</button>
        </div>
      </div>
    </div>

<script>
// ── Flota (defaults editables; se pulirán con el equipo) ──
const FLOTA = [
    { id: 't15', cap: '1.5 T', kg: 1500,  disp: 10, libre: false },
    { id: 't35', cap: '3.5 T', kg: 3500,  disp: 15, libre: false },
    { id: 't5',  cap: '5 T',   kg: 5000,  disp: 5,  libre: false },
    { id: 't10', cap: '10 T',  kg: 10000, disp: 4,  libre: false },
    { id: 't22', cap: '22 T',  kg: 22000, disp: 0,  libre: true  },
    { id: 'tflete', cap: 'Flete', kg: 999999, disp: 0, libre: true }, // >22 T: flete dedicado (sin tope)
];
let DOCS = [];     // documentos importados de SAP
let EXTRAS = [];   // documentos agregados a mano (reprogramaciones / reenvíos)
let DATA = null;

(function initFecha(){
    const d = new Date(); d.setDate(d.getDate()+1);
    document.getElementById('fecha').value = d.toISOString().slice(0,10);
})();

function renderFleet() {
    document.getElementById('fleet').innerHTML = FLOTA.map(t => `
        <div class="fleet-row">
            <div class="cap">${t.cap}<small>${t.id === 'tflete' ? 'sin tope' : t.kg.toLocaleString() + ' kg'}</small></div>
            ${t.libre
                ? `<label class="libre"><input type="checkbox" checked disabled> uso libre</label>`
                : `<div class="stepper">
                     <button onclick="step('${t.id}',-1)">&minus;</button>
                     <input id="f_${t.id}" value="${t.disp}" readonly>
                     <button onclick="step('${t.id}',1)">+</button>
                   </div>`}
        </div>`).join('') +
        `<div class="fleet-note"><i class="bi bi-info-circle"></i> El 22 T es de uso libre (hasta 27 t). Arriba de 27 t va como flete dedicado. El planificador no tiene que usar toda la flota.</div>`;
}
function step(id, d) {
    const t = FLOTA.find(x=>x.id===id); t.disp = Math.max(0, t.disp + d);
    document.getElementById('f_'+id).value = t.disp;
}

async function importar() {
    const fecha = document.getElementById('fecha').value;
    document.getElementById('result').innerHTML = '<div class="spinner"><i class="bi bi-arrow-repeat"></i><p style="margin-top:1rem">Importando pedidos pendientes…</p></div>';
    document.getElementById('btnImportar').disabled = true;
    try {
        const res = await fetch('/api/planificador/pendientes?fecha=' + encodeURIComponent(fecha));
        if (!res.ok) { const e = await res.json().catch(()=>({})); throw new Error(e.error || 'Error al importar'); }
        DATA = await res.json();
        DOCS = DATA.documentos || [];
        renderChips(DATA.resumen);
        renderGrid();
        const fc = document.getElementById('flotaCard');
        fc.style.opacity = '1'; fc.style.pointerEvents = 'auto';
        renderFleet();
        document.getElementById('btnPlan').disabled = (DOCS.length + EXTRAS.length) === 0;
        document.getElementById('btnImportar').innerHTML = '<i class="bi bi-arrow-repeat"></i> Reimportar';
    } catch (err) {
        document.getElementById('result').innerHTML = '<div class="errbox"><i class="bi bi-exclamation-octagon"></i> ' + err.message + '</div>';
    } finally {
        document.getElementById('btnImportar').disabled = false;
    }
}

function renderChips(r) {
    const c = document.getElementById('chips');
    c.classList.remove('hidden');
    c.innerHTML = `
        <div class="chip"><i class="bi bi-file-earmark-text"></i><div><div class="n">${r.documentos}</div><div class="l">Documentos</div></div></div>
        <div class="chip"><i class="bi bi-box-seam"></i><div><div class="n">${r.toneladas} T</div><div class="l">Peso total</div></div></div>
        <div class="chip"><i class="bi bi-list-ul"></i><div><div class="n">${r.lineas}</div><div class="l">Líneas</div></div></div>`;
}

function fmtFecha(f) {
    if (!f) return '';
    // Espera 'YYYY-MM-DD' (texto plano) — sin new Date() para no correr el día por zona horaria
    const m = String(f).match(/^(\d{4})-(\d{2})-(\d{2})/);
    return m ? `${m[3]}/${m[2]}/${m[1]}` : String(f);
}

function tipoBadge(t) {
    const c = { TR: 'tr', RMA: 'rma', ENVIO: 'envio' }[String(t || '').toUpperCase()] || '';
    return `<span class="tipo ${c}">${esc(t || 'OV')}</span>`;
}

function renderGrid() {
    const total = DOCS.length + EXTRAS.length;
    const actions = `
        <div class="grid-actions">
          <span class="ga-l"><i class="bi bi-file-earmark-text"></i> ${DOCS.length} de SAP${EXTRAS.length ? ` · ${EXTRAS.length} manual(es)` : ''}</span>
          <button class="btn-sm btn-new" onclick="openAddDoc()"><i class="bi bi-file-earmark-plus"></i> Agregar documento</button>
        </div>`;

    if (!total) {
        document.getElementById('result').innerHTML = actions +
            '<div class="empty" style="padding:2.5rem 1rem"><i class="bi bi-inbox"></i><p>No hay pedidos pendientes para esa fecha.<br>Puedes <b>agregar documentos</b> manualmente (reprogramaciones / reenvíos).</p></div>';
        return;
    }

    const sapRows = DOCS.map(d => `
        <tr>
            <td class="c-doc"><b>${d.docNum}</b><small>${esc(d.cliente)}</small></td>
            <td>${tipoBadge(d.tipo)}</td>
            <td class="c-fecha">${fmtFecha(d.fechaEntrega)}</td>
            <td class="c-dir">${esc(d.direccion) || '<span class="muted">—</span>'}</td>
            <td class="c-com">${esc(d.comentarios) || '<span class="muted">—</span>'}</td>
            <td class="c-vend">${esc(d.vendedor) || '<span class="muted">—</span>'}</td>
            <td class="c-del"></td>
        </tr>`).join('');

    const manualRows = EXTRAS.map((e, i) => {
        const auto = (e.tipo === 'OV' || e.tipo === 'TR');
        const cli = auto ? '<span class="muted">se resuelve al planificar</span>' : esc(e.cliente);
        const dir = auto ? '<span class="muted">—</span>' : (esc(e.direccion) || '<span class="muted">—</span>');
        const com = auto ? '<span class="muted">—</span>' : (esc(e.comentarios) || '<span class="muted">—</span>');
        const pw = auto ? '' : `<small>${(Number(e.peso) || 0).toLocaleString()} kg</small>`;
        return `<tr class="manual">
            <td class="c-doc"><b>${esc(e.numero)}</b><span class="badge-man">MANUAL</span>${pw}</td>
            <td>${tipoBadge(e.tipo)}</td>
            <td class="c-fecha"><span class="muted">—</span></td>
            <td class="c-dir">${dir}</td>
            <td class="c-com">${com}</td>
            <td class="c-vend">${cli}</td>
            <td class="c-del"><button title="Quitar" onclick="removeExtra(${i})"><i class="bi bi-x-lg"></i></button></td>
        </tr>`;
    }).join('');

    document.getElementById('result').innerHTML = actions + `
        <div class="info-banner"><i class="bi bi-info-circle"></i> Ajusta la flota y presiona <b>Planificar</b> para que la IA los agrupe en rutas dentro de las reglas.</div>
        <div class="grid-wrap">
          <table class="grid">
            <thead><tr>
                <th>Documento</th><th>Tipo</th><th>DocDueDate</th>
                <th>Dirección</th><th>Comentarios</th><th>Cliente / Vendedor</th><th></th>
            </tr></thead>
            <tbody>${sapRows}${manualRows}</tbody>
          </table>
        </div>`;
}

// ── Agregar documento manual ──
function openAddDoc() {
    document.getElementById('mTipo').value = 'OV';
    document.getElementById('mNum').value = '';
    document.getElementById('mCliente').value = '';
    document.getElementById('mDir').value = '';
    document.getElementById('mCom').value = '';
    document.getElementById('mPeso').value = '';
    document.getElementById('mErr').textContent = '';
    onTipoChange();
    document.getElementById('modalDoc').classList.remove('hidden');
    setTimeout(() => document.getElementById('mNum').focus(), 50);
}
function closeAddDoc() { document.getElementById('modalDoc').classList.add('hidden'); }
function onTipoChange() {
    const t = document.getElementById('mTipo').value;
    const manual = (t === 'RMA' || t === 'ENVIO');
    document.getElementById('mManual').classList.toggle('hidden', !manual);
    document.getElementById('mHintDoc').classList.toggle('hidden', manual);
}
function addExtra() {
    const tipo = document.getElementById('mTipo').value;
    const numero = document.getElementById('mNum').value.trim();
    const err = document.getElementById('mErr');
    err.textContent = '';
    if (!numero) { err.textContent = 'Ingresa el número de documento.'; return; }
    if (EXTRAS.some(e => e.tipo === tipo && e.numero === numero)) { err.textContent = `Ese ${tipo} ya está en la lista.`; return; }
    const e = { tipo, numero };
    if (tipo === 'RMA' || tipo === 'ENVIO') {
        e.cliente = document.getElementById('mCliente').value.trim();
        e.direccion = document.getElementById('mDir').value.trim();
        e.comentarios = document.getElementById('mCom').value.trim();
        e.peso = Math.max(0, Math.round(Number(document.getElementById('mPeso').value) || 0));
        if (!e.cliente) { err.textContent = 'Ingresa el cliente.'; return; }
        if (!e.direccion) { err.textContent = 'Ingresa la dirección.'; return; }
        if (!e.peso) { err.textContent = 'Ingresa el peso (kg) — la IA lo necesita para la capacidad.'; return; }
    }
    EXTRAS.push(e);
    closeAddDoc();
    renderGrid();
    document.getElementById('btnPlan').disabled = (DOCS.length + EXTRAS.length) === 0;
}
function removeExtra(i) { EXTRAS.splice(i, 1); renderGrid(); document.getElementById('btnPlan').disabled = (DOCS.length + EXTRAS.length) === 0; }

async function planificar() {
    const fecha = document.getElementById('fecha').value;
    const flota = FLOTA.map(t => ({ tipo: t.cap, kg: t.kg, disponibles: t.libre ? null : t.disp }));
    document.getElementById('result').innerHTML = '<div class="spinner"><i class="bi bi-stars"></i><p style="margin-top:1rem">Planificando con IA… (puede tardar hasta ~1 min)</p></div>';
    document.getElementById('btnPlan').disabled = true;
    try {
        const res = await fetch('/api/planificador/planificar', {
            method: 'POST', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ fecha, flota, extras: EXTRAS })
        });
        const d = await res.json();
        if (!res.ok) {
            let h = '<div class="errbox"><i class="bi bi-exclamation-octagon"></i> ' + esc(d.error || 'Error al planificar');
            if (d.raw) h += '<details style="margin-top:.5rem"><summary style="cursor:pointer">Ver respuesta cruda de la IA</summary><pre style="white-space:pre-wrap;font-size:.72rem;max-height:220px;overflow:auto;background:#fff;padding:.5rem;border-radius:6px;margin-top:.4rem">' + esc(d.raw) + '</pre></details>';
            h += '</div>';
            document.getElementById('result').innerHTML = h;
            return;
        }
        renderPlan(d);
        if (d.aiError) {
            document.getElementById('result').insertAdjacentHTML('afterbegin',
                '<div class="errbox" style="margin:1rem 1rem 0"><i class="bi bi-robot"></i> La IA no está disponible en este momento (problema temporal de Anthropic). Los documentos quedaron <b>sin asignar</b>: ármalos a mano con <b>Nueva ruta</b> + arrastrar, o vuelve a presionar <b>Planificar</b> en unos segundos para el agrupado automático.</div>');
        }
    } catch (err) {
        document.getElementById('result').innerHTML = '<div class="errbox"><i class="bi bi-exclamation-octagon"></i> ' + esc(err.message) + '</div>';
    } finally {
        document.getElementById('btnPlan').disabled = false;
    }
}

let PLAN = null, BYID = {}, SORTKEY = 'nombre';
const MAX_TRUCK_KG = 27000; // tope operativo del 22 T (uso libre); arriba = Flete
const capOf = label => (FLOTA.find(t => t.cap === label) || {}).kg || 0;
// Capacidad efectiva para validar: el 22 T (uso libre) llega a 27 t.
const capEff = label => label === '22 T' ? MAX_TRUCK_KG : capOf(label);

// Resumen corto del estado de una ruta (para el desplegable "Asignar/Cambiar a…")
function rutaStatus(rr) {
    const cap = capEff(rr.camion);
    const peso = (rr.puntos || []).reduce((s, id) => s + ((BYID[id] || {}).peso || 0), 0);
    const pts = (rr.puntos || []).length;
    if (rr.camion === 'Flete' || !cap) return `${peso.toLocaleString()} kg · ${pts} pt · flete`;
    return `${peso.toLocaleString()}/${cap.toLocaleString()} kg · ${pts} pt · ${Math.round(peso / cap * 100)}%`;
}
const optLabel = rr => `${rr.nombre} — ${rutaStatus(rr)}`;

function renderPlan(d) {
    BYID = {}; (d.puntos || []).forEach(p => BYID[p.id] = p);
    PLAN = {
        notas: d.notas || '',
        rutas: (d.rutas || []).map(r => ({
            nombre: r.nombre || r.id || 'Ruta', camion: r.camion || '', region: r.region || '',
            puntos: (r.puntos || []).map(id => Number(id)).filter(id => BYID[id] !== undefined)
        })),
        especiales: (d.especiales || []).filter(id => BYID[id] !== undefined),
        sinAsignar: ((d.validacion && d.validacion.sinAsignar) || []).filter(id => BYID[id] !== undefined)
    };
    ordenarRutas(SORTKEY);
}

// Revalida el plan (en vivo, tras cada arrastre) contra las reglas duras
function validarPlan() {
    const viol = [];
    PLAN.rutas.forEach(r => {
        const cap = capEff(r.camion);
        const peso = r.puntos.reduce((s, id) => s + ((BYID[id] || {}).peso || 0), 0);
        const maxPts = cap >= 10000 ? 3 : 5;
        if (cap && peso > cap * 1.05) viol.push(`"${r.nombre}": ${peso.toLocaleString()} kg excede ${r.camion} (${cap.toLocaleString()} kg + 5%).`);
        if (r.puntos.length > maxPts) viol.push(`"${r.nombre}": ${r.puntos.length} puntos (máx ${maxPts} para ${r.camion}).`);
    });
    return viol;
}

function drawPlan() {
    const viol = validarPlan();
    let html = '';
    if (!viol.length && !PLAN.sinAsignar.length) {
        html += '<div class="okbox"><i class="bi bi-check-circle"></i> Plan válido — cumple capacidad, límite de puntos y sin pendientes.</div>';
    } else {
        html += '<div class="warnbox"><b><i class="bi bi-exclamation-triangle"></i> Revisar:</b><ul>'
            + viol.map(x => `<li>${esc(x)}</li>`).join('')
            + (PLAN.sinAsignar.length ? `<li>${PLAN.sinAsignar.length} punto(s) sin asignar.</li>` : '')
            + '</ul></div>';
    }
    if (PLAN.notas) html += `<div class="notas"><i class="bi bi-chat-left-text"></i> ${esc(PLAN.notas)}</div>`;

    const fechaTxt = fmtFecha(document.getElementById('fecha').value);
    html += `<div class="plan-toolbar">
        <span class="tb-l">Ordenar:</span>
        <select onchange="ordenarRutas(this.value)">
          <option value="nombre"${SORTKEY==='nombre'?' selected':''}>Nombre (A–Z)</option>
          <option value="cap_desc"${SORTKEY==='cap_desc'?' selected':''}>Capacidad (mayor)</option>
          <option value="ocu_desc"${SORTKEY==='ocu_desc'?' selected':''}>Ocupación (mayor)</option>
          <option value="ocu_asc"${SORTKEY==='ocu_asc'?' selected':''}>Ocupación (menor)</option>
          <option value="pts_desc"${SORTKEY==='pts_desc'?' selected':''}># puntos</option>
        </select>
        <span class="tb-l" style="margin-left:auto"><i class="bi bi-calendar3"></i> Entrega: <b>${fechaTxt}</b></span>
        <button class="btn-sm btn-new" onclick="nuevaRuta()"><i class="bi bi-plus-lg"></i> Nueva ruta</button>
        <button class="btn-sm btn-save" id="btnGuardar" onclick="guardarPlan()"><i class="bi bi-cloud-arrow-up"></i> Guardar</button>
      </div>
      <div class="hint"><i class="bi bi-arrows-move"></i> Reasigna con los botones "Desasignar" / "Cambiar" de cada fila, o arrastrando.</div>`;

    if (PLAN.especiales.length) {
        html += `<div class="plan-section" style="color:var(--warn)">Especiales — flete dedicado (${PLAN.especiales.length})</div>`;
        html += pgrid(PLAN.especiales.map(id => BYID[id]).filter(Boolean), -1, 'especial');
    }

    html += `<div class="plan-section">Rutas (${PLAN.rutas.length})</div>`;
    html += PLAN.rutas.map((r, idx) => rutaGrid(r, idx)).join('');

    html += `<div class="plan-section" style="color:${PLAN.sinAsignar.length ? 'var(--danger)' : '#999'}">Sin asignar (${PLAN.sinAsignar.length})</div>`;
    html += `<div class="dropzone" ondragover="onDragOver(event)" ondragleave="onDragLeave(event)" ondrop="onDrop(event, {tipo:'sin'})">`
        + (PLAN.sinAsignar.length ? pgrid(PLAN.sinAsignar.map(id => BYID[id]).filter(Boolean), -1, 'sin') : '<div class="empty-drop">Nada sin asignar. Arrastra aquí o usa "Desasignar".</div>')
        + `</div>`;

    document.getElementById('result').innerHTML = html;
}

function rutaGrid(r, idx) {
    const cap = capEff(r.camion);
    const pts = r.puntos.map(id => BYID[id]).filter(Boolean);
    const peso = pts.reduce((s, p) => s + p.peso, 0);
    const pct = cap ? Math.round(peso / cap * 100) : 0;
    const esFlete = r.camion === 'Flete';
    const maxPts = cap >= 10000 ? 3 : 5;
    const bad = (!esFlete && cap && peso > cap * 1.05) || pts.length > maxPts;
    const truckOpts = FLOTA.map(t => `<option ${t.cap === r.camion ? 'selected' : ''}>${t.cap}</option>`).join('');
    const metaInner = esFlete
        ? `<b>${peso.toLocaleString()} kg</b> · flete (sin tope)`
        : `<b>${peso.toLocaleString()} kg</b> / ${cap.toLocaleString()} · ${pct}%
           <div class="usebar"><div class="fill" style="width:${Math.min(pct,100)}%"></div></div>`;
    return `
      <div class="rgrid ${bad ? 'bad' : ''}" ondragover="onDragOver(event)" ondragleave="onDragLeave(event)" ondrop="onDrop(event, {tipo:'ruta', idx:${idx}})">
        <div class="rgrid-h">
          <input class="rname" value="${escAttr(r.nombre)}" onchange="renombrarRuta(${idx}, this.value)" title="Editar nombre de la ruta">
          <select class="rtruck" onchange="cambiarCamion(${idx}, this.value)" title="Cambiar camión">${truckOpts}</select>
          <div class="rmeta">${metaInner}
            <button class="rdel" title="Eliminar ruta (sus pedidos van a Sin asignar)" onclick="eliminarRuta(${idx})"><i class="bi bi-trash"></i></button>
          </div>
        </div>
        ${pts.length ? pgrid(pts, idx, 'ruta') : '<div class="empty-drop">Sin pedidos — arrástralos aquí o usa "Cambiar / Asignar" desde otra sección.</div>'}
      </div>`;
}

// Grid de puntos con columnas alineadas (revisión rápida) + acciones
function pgrid(pts, idx, mode) {
    const showAct = mode !== 'especial';
    const cols = ['Cliente', 'Ubic.', 'OV', 'Dirección', 'Comentarios', 'Vendedor', 'Peso'].concat(showAct ? ['Acciones'] : []);
    // Anchos FIJOS e idénticos en todas las tablas → columnas alineadas (tipo tabla)
    const widths = showAct
        ? ['15%', '7%', '9%', '19%', '18%', '10%', '8%', '14%']
        : ['17%', '8%', '11%', '22%', '21%', '11%', '10%'];
    const colgroup = `<colgroup>${widths.map(w => `<col style="width:${w}">`).join('')}</colgroup>`;
    return `<div class="grid-wrap"><table class="pgrid">
        ${colgroup}
        <thead><tr>${cols.map(c => `<th>${c}</th>`).join('')}</tr></thead>
        <tbody>${pts.map(p => pgridRow(p, idx, mode)).join('')}</tbody>
      </table></div>`;
}

function pgridRow(p, idx, mode) {
    const chip = p.zona != null ? ('Z' + p.zona) : (p.departamento ? esc(p.departamento.slice(0, 12)) : '—');
    const drag = mode !== 'especial';
    let act = '';
    if (mode === 'ruta') {
        act = `<td class="pg-act">
            <button onclick="desasignar(${p.id})">Desasignar</button>
            <select onchange="if(this.value!==''){moverPunto(${p.id}, this.value)}else{this.selectedIndex=0}">
              <option value="">Cambiar a…</option>
              ${PLAN.rutas.map((rr, ri) => ri === idx ? '' : `<option value="${ri}">${esc(optLabel(rr))}</option>`).join('')}
            </select></td>`;
    } else if (mode === 'sin') {
        act = `<td class="pg-act">
            <select onchange="if(this.value!==''){moverPunto(${p.id}, this.value)}else{this.selectedIndex=0}">
              <option value="">Asignar a…</option>
              ${PLAN.rutas.map((rr, ri) => `<option value="${ri}">${esc(optLabel(rr))}</option>`).join('')}
            </select></td>`;
    }
    return `<tr ${drag ? `draggable="true" ondragstart="onDragStart(event, ${p.id})"` : ''}>
        <td class="pg-cli"><b>${esc(p.cliente)}</b></td>
        <td><span class="z">${chip}</span></td>
        <td>${p.tipo && p.tipo !== 'OV' ? tipoBadge(p.tipo) + ' ' : ''}${esc((p.ovs || []).join(', '))}</td>
        <td class="pg-dir">${esc(p.direccion || '—')}</td>
        <td class="pg-com">${esc(p.comentarios || '—')}</td>
        <td>${esc(p.vendedor || '—')}</td>
        <td class="pg-pw">${p.peso.toLocaleString()} kg</td>
        ${act}
      </tr>`;
}

// ── Arrastrar y soltar (reasignar pedidos entre rutas) ──
function onDragStart(ev, pid) { ev.dataTransfer.setData('text/plain', String(pid)); ev.dataTransfer.effectAllowed = 'move'; }
function onDragOver(ev) { ev.preventDefault(); ev.dataTransfer.dropEffect = 'move'; ev.currentTarget.classList.add('dragover'); }
function onDragLeave(ev) { ev.currentTarget.classList.remove('dragover'); }
function onDrop(ev, target) {
    ev.preventDefault();
    ev.currentTarget.classList.remove('dragover');
    const pid = parseInt(ev.dataTransfer.getData('text/plain'), 10);
    if (isNaN(pid) || !PLAN) return;
    // quitar de donde esté (rutas o sin asignar; los especiales no se mueven)
    PLAN.rutas.forEach(r => { const i = r.puntos.indexOf(pid); if (i >= 0) r.puntos.splice(i, 1); });
    const si = PLAN.sinAsignar.indexOf(pid); if (si >= 0) PLAN.sinAsignar.splice(si, 1);
    // agregar al destino
    if (target.tipo === 'ruta' && PLAN.rutas[target.idx]) {
        if (!PLAN.rutas[target.idx].puntos.includes(pid)) PLAN.rutas[target.idx].puntos.push(pid);
    } else {
        if (!PLAN.sinAsignar.includes(pid)) PLAN.sinAsignar.push(pid);
    }
    drawPlan();
}

// ── Acciones sobre el plan ──
function ordenarRutas(key) {
    SORTKEY = key;
    const peso = r => r.puntos.reduce((s, id) => s + ((BYID[id] || {}).peso || 0), 0);
    const ocu = r => { const c = capOf(r.camion); return c ? peso(r) / c : 0; };
    const cmp = {
        nombre: (a, b) => String(a.nombre).localeCompare(String(b.nombre), 'es'),
        cap_desc: (a, b) => capOf(b.camion) - capOf(a.camion),
        ocu_desc: (a, b) => ocu(b) - ocu(a),
        ocu_asc: (a, b) => ocu(a) - ocu(b),
        pts_desc: (a, b) => b.puntos.length - a.puntos.length
    }[key];
    if (cmp && PLAN) PLAN.rutas.sort(cmp);
    drawPlan();
}
function renombrarRuta(idx, val) { if (PLAN && PLAN.rutas[idx]) { const v = (val || '').trim(); if (v) PLAN.rutas[idx].nombre = v; } }
function cambiarCamion(idx, val) { if (PLAN && PLAN.rutas[idx]) { PLAN.rutas[idx].camion = val; drawPlan(); } }
function nuevaRuta() { if (!PLAN) return; PLAN.rutas.push({ nombre: 'Ruta nueva ' + (PLAN.rutas.length + 1), camion: '5 T', region: '', puntos: [] }); drawPlan(); }

async function guardarPlan() {
    if (!PLAN) return;
    const viol = validarPlan();
    if (viol.length || PLAN.sinAsignar.length) {
        if (!confirm('Hay rutas por revisar o puntos sin asignar. ¿Guardar de todos modos?')) return;
    }
    const rutas = PLAN.rutas.map(r => ({
        nombre: r.nombre,
        camion: r.camion,
        documentos: r.puntos.flatMap(id => {
            const p = BYID[id]; if (!p) return [];
            const tipo = p.tipo || 'OV';
            const nums = (p.ovs && p.ovs.length) ? p.ovs : [];
            // Un solo documento en el punto → mandamos su peso (para manuales);
            // si son varios (OV agrupadas) el backend usa el peso de SAP.
            return nums.map(n => ({ numero: String(n), tipo, peso: nums.length === 1 ? (p.peso || 0) : null }));
        })
    })).filter(r => r.documentos.length);
    if (!rutas.length) { alert('No hay rutas con documentos para guardar.'); return; }

    const totalDocs = rutas.reduce((s, r) => s + r.documentos.length, 0);
    if (!confirm(`Se limpiará la cola RutasLocales y se cargará el plan actual (${rutas.length} rutas, ${totalDocs} documentos). ¿Continuar?`)) return;

    const btn = document.getElementById('btnGuardar');
    const fecha = document.getElementById('fecha').value;
    if (btn) { btn.disabled = true; btn.innerHTML = '<i class="bi bi-arrow-repeat"></i> Guardando…'; }
    try {
        const res = await fetch('/api/planificador/guardar', {
            method: 'POST', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ fecha, bodega: '01', rutas })
        });
        const d = await res.json();
        if (!res.ok) throw new Error(d.error || 'Error al guardar');
        alert(`✓ Guardado en RutasLocales: ${d.rutas} rutas, ${d.filas} documentos.`);
    } catch (err) {
        alert('Error al guardar: ' + err.message);
    } finally {
        if (btn) { btn.disabled = false; btn.innerHTML = '<i class="bi bi-cloud-arrow-up"></i> Guardar'; }
    }
}
function eliminarRuta(idx) {
    const r = PLAN && PLAN.rutas[idx]; if (!r) return;
    r.puntos.forEach(id => { if (!PLAN.sinAsignar.includes(id)) PLAN.sinAsignar.push(id); });
    PLAN.rutas.splice(idx, 1);
    drawPlan();
}
function desasignar(pid) { moverPunto(pid, 'sin'); }
function moverPunto(pid, dest) {
    pid = +pid; if (!PLAN) return;
    PLAN.rutas.forEach(r => { const i = r.puntos.indexOf(pid); if (i >= 0) r.puntos.splice(i, 1); });
    const si = PLAN.sinAsignar.indexOf(pid); if (si >= 0) PLAN.sinAsignar.splice(si, 1);
    if (dest === 'sin') { if (!PLAN.sinAsignar.includes(pid)) PLAN.sinAsignar.push(pid); }
    else { const ri = +dest; if (PLAN.rutas[ri] && !PLAN.rutas[ri].puntos.includes(pid)) PLAN.rutas[ri].puntos.push(pid); }
    drawPlan();
}

function esc(s) { const d = document.createElement('div'); d.textContent = s == null ? '' : s; return d.innerHTML; }
function escAttr(s) { return String(s == null ? '' : s).replace(/&/g, '&amp;').replace(/"/g, '&quot;').replace(/</g, '&lt;').replace(/>/g, '&gt;'); }
