<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Planificador de Rutas - Zona 5</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <style>
        :root {
            --primary: #d4a826; --primary-dark: #b8941f;
            --dark: #222222; --dark-light: #2d2d2d;
            --success: #2e7d32; --danger: #c62828; --warn: #ef6c00;
            --bg: #f5f5f5;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--bg); min-height: 100vh; color: #333; }

        .navbar-app {
            background: var(--dark); color: white; padding: 0.7rem 1.3rem;
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 3px solid var(--primary); box-shadow: 0 2px 8px rgba(0,0,0,.3);
        }
        .navbar-app .brand { display: flex; align-items: center; gap: .6rem; font-weight: 700; font-size: 1rem; }
        .navbar-app .brand i { color: var(--primary); font-size: 1.2rem; }
        .navbar-app a { color: #ccc; text-decoration: none; font-size: .85rem; display: flex; align-items: center; gap: .3rem; }
        .navbar-app a:hover { color: var(--primary); }

        /* Toolbar */
        .toolbar {
            display: flex; align-items: center; gap: 1rem; flex-wrap: wrap;
            padding: 1rem 1.5rem; background: white; border-bottom: 1px solid #e5e5e5;
        }
        .toolbar h1 { font-size: 1.1rem; font-weight: 700; margin-right: auto; }
        .toolbar h1 i { color: var(--warn); }
        .field { display: flex; align-items: center; gap: .4rem; font-size: .85rem; color: #666; }
        .field input[type=date] { padding: .4rem .6rem; border: 1px solid #ccc; border-radius: 6px; font-size: .85rem; }

        .btn { border: none; border-radius: 8px; font-weight: 600; cursor: pointer; display: inline-flex; align-items: center; gap: .4rem; padding: .55rem 1.1rem; font-size: .88rem; }
        .btn-primary { background: var(--primary); color: #222; }
        .btn-primary:hover { background: var(--primary-dark); }
        .btn-plan { background: var(--warn); color: white; width: 100%; justify-content: center; padding: .7rem; font-size: .95rem; }
        .btn-plan:hover { background: #d35f00; }
        .btn:disabled { opacity: .5; cursor: not-allowed; }

        /* Summary chips */
        .chips { display: flex; gap: .7rem; flex-wrap: wrap; padding: 1rem 1.5rem 0; }
        .chip { background: white; border: 1px solid #e5e5e5; border-radius: 10px; padding: .6rem .9rem; display: flex; align-items: center; gap: .55rem; box-shadow: 0 1px 3px rgba(0,0,0,.05); }
        .chip i { font-size: 1.3rem; color: var(--primary); }
        .chip.warn i { color: var(--warn); }
        .chip .n { font-size: 1.15rem; font-weight: 800; line-height: 1; }
        .chip .l { font-size: .7rem; color: #888; text-transform: uppercase; letter-spacing: .5px; }

        /* Layout */
        .layout { display: grid; grid-template-columns: 280px 1fr; gap: 1.2rem; padding: 1.2rem 1.5rem; align-items: start; }
        @media (max-width: 820px) { .layout { grid-template-columns: 1fr; } }
        .card { background: white; border: 1px solid #e9e9e9; border-radius: 12px; box-shadow: 0 1px 4px rgba(0,0,0,.05); }
        .card-h { padding: .8rem 1rem; border-bottom: 1px solid #eee; font-weight: 700; font-size: .9rem; display: flex; align-items: center; gap: .5rem; }
        .card-h i { color: var(--warn); }
        .card-b { padding: 1rem; }

        /* Fleet */
        .fleet-row { display: flex; align-items: center; justify-content: space-between; padding: .55rem 0; border-bottom: 1px dashed #eee; }
        .fleet-row:last-child { border-bottom: none; }
        .fleet-row .cap { font-weight: 700; font-size: .9rem; }
        .fleet-row .cap small { color: #999; font-weight: 400; display: block; font-size: .68rem; }
        .stepper { display: flex; align-items: center; gap: .3rem; }
        .stepper button { width: 26px; height: 26px; border: 1px solid #ddd; background: #fafafa; border-radius: 6px; cursor: pointer; font-weight: 700; color: #555; }
        .stepper button:hover { background: #f0f0f0; }
        .stepper input { width: 42px; text-align: center; border: 1px solid #ddd; border-radius: 6px; padding: .3rem; font-size: .85rem; }
        .libre { font-size: .72rem; color: #666; display: flex; align-items: center; gap: .3rem; cursor: pointer; }
        .fleet-note { font-size: .72rem; color: #999; margin-top: .7rem; line-height: 1.4; }

        /* Empty state */
        .empty { text-align: center; padding: 4rem 1rem; color: #999; }
        .empty i { font-size: 3rem; color: #ddd; display: block; margin-bottom: 1rem; }
        .empty p { margin-bottom: 1.2rem; }

        /* Result sections */
        .section-title { font-size: .8rem; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; color: #888; margin: 1.2rem 0 .6rem; display: flex; align-items: center; gap: .5rem; }
        .section-title:first-child { margin-top: 0; }
        .section-title .badge { background: #eee; color: #666; border-radius: 20px; padding: .1rem .5rem; font-size: .7rem; }

        .route { border: 1px solid #e9e9e9; border-radius: 10px; margin-bottom: .7rem; overflow: hidden; background: white; }
        .route-h { display: flex; align-items: center; gap: .8rem; padding: .75rem 1rem; cursor: pointer; }
        .route-h:hover { background: #fafafa; }
        .route-name { font-weight: 700; font-size: .9rem; }
        .route-name small { display: block; color: #999; font-weight: 400; font-size: .72rem; }
        .truck { background: #eef2ff; color: #3949ab; border-radius: 6px; padding: .2rem .5rem; font-size: .75rem; font-weight: 700; white-space: nowrap; }
        .route-meta { margin-left: auto; text-align: right; font-size: .75rem; color: #888; white-space: nowrap; }
        .route-meta b { color: #333; font-size: .85rem; }
        .usebar { height: 5px; background: #eee; border-radius: 3px; margin-top: .3rem; overflow: hidden; width: 90px; margin-left: auto; }
        .usebar .fill { height: 100%; background: var(--success); }
        .usebar .fill.mid { background: var(--primary); }
        .usebar .fill.low { background: #bbb; }
        .route-pts { padding: 0 1rem 0 1rem; max-height: 0; overflow: hidden; transition: max-height .2s ease, padding .2s ease; }
        .route.open .route-pts { max-height: 400px; padding: .5rem 1rem .8rem; border-top: 1px solid #f0f0f0; }
        .pt { display: flex; align-items: center; gap: .6rem; padding: .35rem 0; font-size: .82rem; border-bottom: 1px dashed #f2f2f2; }
        .pt:last-child { border-bottom: none; }
        .pt .z { background: #f0f0f0; color: #666; border-radius: 5px; padding: .1rem .4rem; font-size: .68rem; font-weight: 700; min-width: 46px; text-align: center; }
        .pt .cli { flex: 1; }
        .pt .cli small { color: #aaa; }
        .pt .pw { color: #888; font-variant-numeric: tabular-nums; }

        /* Especiales */
        .route.especial { border-color: #f6c6a8; background: #fff8f2; }
        .route.especial .truck { background: #fdecdd; color: var(--warn); }
        .especial-note { font-size: .72rem; color: var(--warn); padding: 0 1rem .7rem; }

        .foot { display: flex; justify-content: flex-end; gap: .7rem; padding: 1rem 1.5rem 2rem; }
        .hidden { display: none !important; }
        .spinner { text-align: center; padding: 3rem; color: #999; }
        .spinner i { font-size: 2rem; animation: spin 1s linear infinite; display: inline-block; color: var(--warn); }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <nav class="navbar-app">
        <div class="brand"><i class="bi bi-diagram-3"></i> Planificador de Rutas</div>
        <a href="/dashboard"><i class="bi bi-arrow-left"></i> Dashboard</a>
    </nav>

    <div class="toolbar">
        <h1><i class="bi bi-geo-alt-fill"></i> Zona 5 &mdash; Pendiente de planificar</h1>
        <label class="field"><i class="bi bi-calendar3"></i> Fecha de entrega
            <input type="date" id="fecha">
        </label>
        <button class="btn btn-primary" id="btnImportar" onclick="importar()"><i class="bi bi-download"></i> Importar rutas</button>
    </div>

    <!-- Chips resumen -->
    <div class="chips hidden" id="chips"></div>

    <div class="layout">
        <!-- Panel flota -->
        <div class="card" id="flotaCard" style="opacity:.5;pointer-events:none">
            <div class="card-h"><i class="bi bi-truck"></i> Flota disponible</div>
            <div class="card-b" id="fleet"></div>
            <div class="card-b" style="border-top:1px solid #eee;padding-top:.8rem">
                <button class="btn btn-plan" id="btnPlan" onclick="planificar()" disabled><i class="bi bi-stars"></i> Planificar</button>
            </div>
        </div>

        <!-- Resultado -->
        <div class="card">
            <div class="card-h"><i class="bi bi-signpost-split"></i> Rutas sugeridas</div>
            <div class="card-b" id="result">
                <div class="empty" id="emptyState">
                    <i class="bi bi-inbox"></i>
                    <p>Importa las rutas pendientes para comenzar a planificar.</p>
                    <button class="btn btn-primary" onclick="importar()"><i class="bi bi-download"></i> Importar rutas</button>
                </div>
            </div>
        </div>
    </div>

    <div class="foot hidden" id="foot">
        <button class="btn" style="background:#eee;color:#555" onclick="location.reload()"><i class="bi bi-arrow-counterclockwise"></i> Reiniciar</button>
        <button class="btn btn-primary" onclick="alert('(Fase 3) Aqui se cargaran las rutas confirmadas como cuadros de ruta.')"><i class="bi bi-check2-circle"></i> Cargar rutas</button>
    </div>

<script>
// ==== DATOS MOCK (datos reales de hoy) — Fase 1: solo layout ====
const FLOTA = [
    { id: 't15', cap: '1.5 T', kg: 1500, disp: 10, libre: false },
    { id: 't35', cap: '3.5 T', kg: 3500, disp: 15, libre: false },
    { id: 't5',  cap: '5 T',   kg: 5000, disp: 5,  libre: false },
    { id: 't10', cap: '10 T',  kg: 10000, disp: 0, libre: true },
    { id: 't22', cap: '22 T',  kg: 22000, disp: 0, libre: true },
];
const RESUMEN = { puntos: 39, toneladas: 87.9, lineas: 254, exceden: 3 };

const PLAN = {
    especiales: [
        { name: 'Cáceres & Mazariegos', sub: 'Chimaltenango', peso: 27654, pts: [{z:'Chimalt.', cli:'Constructora Cáceres & Mazariegos', pw:27654}] },
        { name: 'Constructora Cúspide', sub: 'Zona 10', peso: 17640, pts: [{z:'Z10', cli:'Constructora Cúspide, S.A.', pw:17640}] },
        { name: 'Yonatan López', sub: 'Malacatán, San Marcos', peso: 11025, pts: [{z:'S.Marcos', cli:'Yonatan Odaíl López Sandoval', pw:11025}] },
    ],
    regionales: [
        { name: 'R1 Chimaltenango', sub: 'Chimaltenango', truck:'1.5 T', pct:52, peso:775, pts:[{z:'Chimalt.',cli:'José F. Meletz Batz',pw:736},{z:'Chimalt.',cli:'Cristopher Harry',pw:39}] },
        { name: 'R2 Sacatepéquez', sub: 'Sta. Lucía Milpas Altas', truck:'5 T', pct:91, peso:4562, pts:[{z:'Sacatep.',cli:'Walter Rogel',pw:4562}] },
        { name: 'R3 Altiplano Norte', sub: 'Quiché · A.V. · Sololá', truck:'5 T', pct:91, peso:4533, pts:[{z:'Quiché',cli:'Domingo Lorenzo (Sacapulas)',pw:4413},{z:'A.Verap.',cli:'Edwin España (Cobán)',pw:119},{z:'Sololá',cli:'Andrés Ixcaya',pw:1}] },
        { name: 'R4 Oriente', sub: 'Jalapa · Jutiapa', truck:'5 T', pct:89, peso:4458, pts:[{z:'Jalapa',cli:'Henry Hernández (S.M. Chaparrón)',pw:3600},{z:'Jutiapa',cli:'Hander Cabrera',pw:858}] },
        { name: 'R5 Escuintla', sub: 'Escuintla', truck:'1.5 T', pct:49, peso:739, pts:[{z:'Escuint.',cli:'Luis Pineda (San José)',pw:670},{z:'Escuint.',cli:'Rigoberto Orellana',pw:69}] },
        { name: 'R6 Izabal', sub: 'Morales', truck:'1.5 T', pct:30, peso:443, pts:[{z:'Izabal',cli:'Adonai Villeda (Morales)',pw:443}] },
    ],
    metro: [
        { name: 'M1 Este Z10', sub: 'Zona 10', truck:'5 T', pct:91, peso:4540, pts:[{z:'Z10',cli:'Inversiones VAR',pw:2674},{z:'Z10',cli:'Alex Villeda',pw:1457},{z:'Z10',cli:'Ferretería de la Construcción',pw:405},{z:'Z10',cli:'Lesli Vásquez',pw:4}] },
        { name: 'M2 Roosevelt', sub: 'Zonas 7 · 6', truck:'3.5 T', pct:84, peso:2947, pts:[{z:'Z7',cli:'Seraph Systems',pw:2584},{z:'Z7',cli:'Láminas Cóndor',pw:300},{z:'Z6',cli:'Jhoshua Ortiz',pw:62},{z:'Z7',cli:'Ferretería (La Floresta)',pw:1}] },
        { name: 'M3 Vista Hermosa', sub: 'Zonas 16 · 17', truck:'3.5 T', pct:85, peso:2958, pts:[{z:'Z16',cli:'Vara de Almendro',pw:2186},{z:'Z16',cli:'Francisco Unda',pw:451},{z:'Z17',cli:'Teresa Hermosillo',pw:250},{z:'Z16',cli:'Asociación Civil',pw:43},{z:'Z16',cli:'Puente Colonial',pw:28}] },
        { name: 'M4 Oeste / Mixco', sub: 'Zonas 11 · 12 · 3 · 8', truck:'3.5 T', pct:70, peso:2441, pts:[{z:'Z11',cli:'Delicatessen La Estancia',pw:1435},{z:'Z3',cli:'Cristian Castellanos (Mixco)',pw:744},{z:'Z12',cli:'Disar, S.A.',pw:163},{z:'Z8',cli:'Logística Superior (Mixco)',pw:59},{z:'—',cli:'Ferretería de la Construcción',pw:40}] },
        { name: 'M5 Sur', sub: 'Zonas 13 · 14 · 21', truck:'1.5 T', pct:96, peso:1440, pts:[{z:'Z14',cli:'María Eugenia García',pw:697},{z:'Z13',cli:'Iglesia Hebrón',pw:600},{z:'Z0',cli:'Javier Recinos',pw:96},{z:'Z21',cli:'Damaris Román',pw:47}] },
        { name: 'M6 Fraijanes', sub: 'Z0 · Fraijanes', truck:'3.5 T', pct:50, peso:1757, pts:[{z:'Z0',cli:'Grupo ECQ, S.A.',pw:1747},{z:'Fraij.',cli:'Carlos Nájera',pw:10}] },
    ],
};

// ==== init ====
(function initFecha(){
    const d = new Date(); d.setDate(d.getDate()+1);
    document.getElementById('fecha').value = d.toISOString().slice(0,10);
})();

function renderFleet() {
    document.getElementById('fleet').innerHTML = FLOTA.map(t => `
        <div class="fleet-row">
            <div class="cap">${t.cap}<small>${t.kg.toLocaleString()} kg</small></div>
            ${t.libre
                ? `<label class="libre"><input type="checkbox" checked disabled> uso libre</label>`
                : `<div class="stepper">
                     <button onclick="step('${t.id}',-1)">&minus;</button>
                     <input id="f_${t.id}" value="${t.disp}" readonly>
                     <button onclick="step('${t.id}',1)">+</button>
                   </div>`}
        </div>`).join('') +
        `<div class="fleet-note"><i class="bi bi-info-circle"></i> Los camiones de 10 T y 22 T son de uso libre (sin tope). El planificador no tiene que usar toda la flota.</div>`;
}
function step(id, d) {
    const t = FLOTA.find(x=>x.id===id); t.disp = Math.max(0, t.disp + d);
    document.getElementById('f_'+id).value = t.disp;
}

function importar() {
    const c = document.getElementById('chips');
    c.classList.remove('hidden');
    c.innerHTML = `
        <div class="chip"><i class="bi bi-geo-alt"></i><div><div class="n">${RESUMEN.puntos}</div><div class="l">Puntos de entrega</div></div></div>
        <div class="chip"><i class="bi bi-box-seam"></i><div><div class="n">${RESUMEN.toneladas} T</div><div class="l">Peso total</div></div></div>
        <div class="chip"><i class="bi bi-list-ul"></i><div><div class="n">${RESUMEN.lineas}</div><div class="l">Líneas</div></div></div>
        <div class="chip warn"><i class="bi bi-exclamation-triangle"></i><div><div class="n">${RESUMEN.exceden}</div><div class="l">Exceden capacidad</div></div></div>`;
    renderFleet();
    const fc = document.getElementById('flotaCard');
    fc.style.opacity = '1'; fc.style.pointerEvents = 'auto';
    document.getElementById('btnPlan').disabled = false;
    document.getElementById('emptyState').innerHTML =
        '<i class="bi bi-stars"></i><p>Ajusta la flota y presiona <b>Planificar</b> para generar las rutas sugeridas.</p>';
    document.getElementById('btnImportar').innerHTML = '<i class="bi bi-check2"></i> Importado';
}

function planificar() {
    document.getElementById('result').innerHTML = '<div class="spinner"><i class="bi bi-arrow-repeat"></i><p style="margin-top:1rem">Generando planificación…</p></div>';
    setTimeout(renderPlan, 900); // simula llamada a la API (Fase 3)
}

function routeCard(r, especial) {
    const cls = r.pct >= 80 ? '' : (r.pct >= 50 ? 'mid' : 'low');
    const meta = especial
        ? `<div class="route-meta"><b>${r.peso.toLocaleString()} kg</b><br>excede 10 T</div>`
        : `<div class="route-meta"><b>${r.peso.toLocaleString()} kg</b> · ${r.pts.length} pts
             <div class="usebar"><div class="fill ${cls}" style="width:${r.pct}%"></div></div></div>`;
    return `
      <div class="route ${especial?'especial':''}" onclick="this.classList.toggle('open')">
        <div class="route-h">
          <span class="truck">${especial ? 'FLETE' : r.truck}</span>
          <div class="route-name">${r.name}<small>${r.sub}</small></div>
          ${meta}
        </div>
        ${especial ? '<div class="especial-note"><i class="bi bi-exclamation-triangle"></i> Supera el camión más grande — requiere flete dedicado o viajes múltiples.</div>' : ''}
        <div class="route-pts">
          ${r.pts.map(p=>`<div class="pt"><span class="z">${p.z}</span><span class="cli">${p.cli}</span><span class="pw">${p.pw.toLocaleString()} kg</span></div>`).join('')}
        </div>
      </div>`;
}

function renderPlan() {
    let html = '';
    html += `<div class="section-title" style="color:var(--warn)"><i class="bi bi-exclamation-triangle-fill"></i> Especiales <span class="badge">${PLAN.especiales.length}</span></div>`;
    html += PLAN.especiales.map(r=>routeCard(r,true)).join('');
    html += `<div class="section-title"><i class="bi bi-globe-americas"></i> Regionales <span class="badge">${PLAN.regionales.length}</span></div>`;
    html += PLAN.regionales.map(r=>routeCard(r,false)).join('');
    html += `<div class="section-title"><i class="bi bi-buildings"></i> Metropolitanas <span class="badge">${PLAN.metro.length}</span></div>`;
    html += PLAN.metro.map(r=>routeCard(r,false)).join('');
    document.getElementById('result').innerHTML = html;
    document.getElementById('foot').classList.remove('hidden');
}
</script>
</body>
</html>
