<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Planificador de Rutas - Zona 5</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <style>
        :root {
            --primary: #d4a826; --primary-dark: #b8941f;
            --dark: #222222; --dark-light: #2d2d2d;
            --success: #2e7d32; --danger: #c62828; --warn: #ef6c00;
            --bg: #f5f5f5;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--bg); min-height: 100vh; color: #333; }

        .navbar-app {
            background: var(--dark); color: white; padding: 0.7rem 1.3rem;
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 3px solid var(--primary); box-shadow: 0 2px 8px rgba(0,0,0,.3);
        }
        .navbar-app .brand { display: flex; align-items: center; gap: .6rem; font-weight: 700; font-size: 1rem; }
        .navbar-app .brand i { color: var(--primary); font-size: 1.2rem; }
        .navbar-app a { color: #ccc; text-decoration: none; font-size: .85rem; display: flex; align-items: center; gap: .3rem; }
        .navbar-app a:hover { color: var(--primary); }

        /* Toolbar */
        .toolbar {
            display: flex; align-items: center; gap: 1rem; flex-wrap: wrap;
            padding: 1rem 1.5rem; background: white; border-bottom: 1px solid #e5e5e5;
        }
        .toolbar h1 { font-size: 1.1rem; font-weight: 700; margin-right: auto; }
        .toolbar h1 i { color: var(--warn); }
        .field { display: flex; align-items: center; gap: .4rem; font-size: .85rem; color: #666; }
        .field input[type=date] { padding: .4rem .6rem; border: 1px solid #ccc; border-radius: 6px; font-size: .85rem; }

        .btn { border: none; border-radius: 8px; font-weight: 600; cursor: pointer; display: inline-flex; align-items: center; gap: .4rem; padding: .55rem 1.1rem; font-size: .88rem; }
        .btn-primary { background: var(--primary); color: #222; }
        .btn-primary:hover { background: var(--primary-dark); }
        .btn-plan { background: var(--warn); color: white; width: 100%; justify-content: center; padding: .7rem; font-size: .95rem; }
        .btn-plan:hover { background: #d35f00; }
        .btn:disabled { opacity: .5; cursor: not-allowed; }

        /* Summary chips */
        .chips { display: flex; gap: .7rem; flex-wrap: wrap; padding: 1rem 1.5rem 0; }
        .chip { background: white; border: 1px solid #e5e5e5; border-radius: 10px; padding: .6rem .9rem; display: flex; align-items: center; gap: .55rem; box-shadow: 0 1px 3px rgba(0,0,0,.05); }
        .chip i { font-size: 1.3rem; color: var(--primary); }
        .chip.warn i { color: var(--warn); }
        .chip .n { font-size: 1.15rem; font-weight: 800; line-height: 1; }
        .chip .l { font-size: .7rem; color: #888; text-transform: uppercase; letter-spacing: .5px; }

        /* Layout */
        .layout { display: grid; grid-template-columns: 280px 1fr; gap: 1.2rem; padding: 1.2rem 1.5rem; align-items: start; }
        @media (max-width: 820px) { .layout { grid-template-columns: 1fr; } }
        .card { background: white; border: 1px solid #e9e9e9; border-radius: 12px; box-shadow: 0 1px 4px rgba(0,0,0,.05); }
        .card-h { padding: .8rem 1rem; border-bottom: 1px solid #eee; font-weight: 700; font-size: .9rem; display: flex; align-items: center; gap: .5rem; }
        .card-h i { color: var(--warn); }
        .card-b { padding: 1rem; }

        /* Fleet */
        .fleet-row { display: flex; align-items: center; justify-content: space-between; padding: .55rem 0; border-bottom: 1px dashed #eee; }
        .fleet-row:last-child { border-bottom: none; }
        .fleet-row .cap { font-weight: 700; font-size: .9rem; }
        .fleet-row .cap small { color: #999; font-weight: 400; display: block; font-size: .68rem; }
        .stepper { display: flex; align-items: center; gap: .3rem; }
        .stepper button { width: 26px; height: 26px; border: 1px solid #ddd; background: #fafafa; border-radius: 6px; cursor: pointer; font-weight: 700; color: #555; }
        .stepper button:hover { background: #f0f0f0; }
        .stepper input { width: 42px; text-align: center; border: 1px solid #ddd; border-radius: 6px; padding: .3rem; font-size: .85rem; }
        .libre { font-size: .72rem; color: #666; display: flex; align-items: center; gap: .3rem; cursor: pointer; }
        .fleet-note { font-size: .72rem; color: #999; margin-top: .7rem; line-height: 1.4; }

        /* Empty / loading state */
        .empty { text-align: center; padding: 4rem 1rem; color: #999; }
        .empty i { font-size: 3rem; color: #ddd; display: block; margin-bottom: 1rem; }
        .empty p { margin-bottom: 1.2rem; }
        .spinner { text-align: center; padding: 3rem; color: #999; }
        .spinner i { font-size: 2rem; animation: spin 1s linear infinite; display: inline-block; color: var(--warn); }
        @keyframes spin { to { transform: rotate(360deg); } }
        .errbox { background: #fdecea; color: var(--danger); border: 1px solid #f5c6c0; border-radius: 8px; padding: 1rem; font-size: .85rem; }

        /* Result sections */
        .section-title { font-size: .8rem; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; color: #888; margin: 1.2rem 0 .6rem; display: flex; align-items: center; gap: .5rem; }
        .section-title:first-child { margin-top: 0; }
        .section-title .badge { background: #eee; color: #666; border-radius: 20px; padding: .1rem .5rem; font-size: .7rem; }

        .group { border: 1px solid #e9e9e9; border-radius: 10px; margin-bottom: .7rem; overflow: hidden; background: white; }
        .group-h { display: flex; align-items: center; gap: .8rem; padding: .6rem 1rem; cursor: pointer; background: #fafafa; }
        .group-h:hover { background: #f3f3f3; }
        .group-name { font-weight: 700; font-size: .88rem; }
        .group-meta { margin-left: auto; font-size: .78rem; color: #888; white-space: nowrap; }
        .group-meta b { color: #333; }
        .group-pts { padding: .3rem 1rem .5rem; }
        .pt { display: flex; align-items: center; gap: .6rem; padding: .35rem 0; font-size: .82rem; border-bottom: 1px dashed #f2f2f2; }
        .pt:last-child { border-bottom: none; }
        .pt .z { background: #f0f0f0; color: #666; border-radius: 5px; padding: .1rem .4rem; font-size: .68rem; font-weight: 700; min-width: 52px; text-align: center; }
        .pt .cli { flex: 1; }
        .pt .cli small { color: #aaa; }
        .pt .pw { color: #666; font-variant-numeric: tabular-nums; white-space: nowrap; }

        /* Especiales */
        .group.especial { border-color: #f6c6a8; background: #fff8f2; }
        .group.especial .group-h { background: #fdf1e7; }
        .especial-note { font-size: .72rem; color: var(--warn); padding: 0 1rem .6rem; }

        .info-banner { background: #fff8f2; border: 1px dashed #f6c6a8; color: var(--warn); border-radius: 8px; padding: .8rem 1rem; font-size: .82rem; margin-bottom: 1rem; display: flex; align-items: center; gap: .5rem; }

        .foot { display: flex; justify-content: flex-end; gap: .7rem; padding: 1rem 1.5rem 2rem; }
        .hidden { display: none !important; }
    </style>
</head>
<body>
    <nav class="navbar-app">
        <div class="brand"><i class="bi bi-diagram-3"></i> Planificador de Rutas</div>
        <a href="/dashboard"><i class="bi bi-arrow-left"></i> Dashboard</a>
    </nav>

    <div class="toolbar">
        <h1><i class="bi bi-geo-alt-fill"></i> Zona 5 &mdash; Pendiente de planificar</h1>
        <label class="field"><i class="bi bi-calendar3"></i> Fecha de entrega
            <input type="date" id="fecha">
        </label>
        <button class="btn btn-primary" id="btnImportar" onclick="importar()"><i class="bi bi-download"></i> Importar rutas</button>
    </div>

    <!-- Chips resumen -->
    <div class="chips hidden" id="chips"></div>

    <div class="layout">
        <!-- Panel flota -->
        <div class="card" id="flotaCard" style="opacity:.5;pointer-events:none">
            <div class="card-h"><i class="bi bi-truck"></i> Flota disponible</div>
            <div class="card-b" id="fleet"></div>
            <div class="card-b" style="border-top:1px solid #eee;padding-top:.8rem">
                <button class="btn btn-plan" id="btnPlan" onclick="planificar()" disabled><i class="bi bi-stars"></i> Planificar</button>
            </div>
        </div>

        <!-- Resultado -->
        <div class="card">
            <div class="card-h"><i class="bi bi-signpost-split"></i> Puntos pendientes</div>
            <div class="card-b" id="result">
                <div class="empty" id="emptyState">
                    <i class="bi bi-inbox"></i>
                    <p>Importa las rutas pendientes para comenzar a planificar.</p>
                    <button class="btn btn-primary" onclick="importar()"><i class="bi bi-download"></i> Importar rutas</button>
                </div>
            </div>
        </div>
    </div>

<script>
// ── Flota (defaults editables; se pulirán con el equipo) ──
const FLOTA = [
    { id: 't15', cap: '1.5 T', kg: 1500,  disp: 10, libre: false },
    { id: 't35', cap: '3.5 T', kg: 3500,  disp: 15, libre: false },
    { id: 't5',  cap: '5 T',   kg: 5000,  disp: 5,  libre: false },
    { id: 't10', cap: '10 T',  kg: 10000, disp: 4,  libre: false },
    { id: 't22', cap: '22 T',  kg: 22000, disp: 0,  libre: true  },
];
let PUNTOS = [];   // puntos de entrega importados (datos reales)
let DATA = null;   // respuesta completa del endpoint

(function initFecha(){
    const d = new Date(); d.setDate(d.getDate()+1);
    document.getElementById('fecha').value = d.toISOString().slice(0,10);
})();

function renderFleet() {
    document.getElementById('fleet').innerHTML = FLOTA.map(t => `
        <div class="fleet-row">
            <div class="cap">${t.cap}<small>${t.kg.toLocaleString()} kg</small></div>
            ${t.libre
                ? `<label class="libre"><input type="checkbox" checked disabled> uso libre</label>`
                : `<div class="stepper">
                     <button onclick="step('${t.id}',-1)">&minus;</button>
                     <input id="f_${t.id}" value="${t.disp}" readonly>
                     <button onclick="step('${t.id}',1)">+</button>
                   </div>`}
        </div>`).join('') +
        `<div class="fleet-note"><i class="bi bi-info-circle"></i> El camión de 22 T es de uso libre (sin tope). El planificador no tiene que usar toda la flota.</div>`;
}
function step(id, d) {
    const t = FLOTA.find(x=>x.id===id); t.disp = Math.max(0, t.disp + d);
    document.getElementById('f_'+id).value = t.disp;
}

async function importar() {
    const fecha = document.getElementById('fecha').value;
    document.getElementById('result').innerHTML = '<div class="spinner"><i class="bi bi-arrow-repeat"></i><p style="margin-top:1rem">Importando pedidos pendientes…</p></div>';
    document.getElementById('btnImportar').disabled = true;
    try {
        const res = await fetch('/api/planificador/pendientes?fecha=' + encodeURIComponent(fecha));
        if (!res.ok) { const e = await res.json().catch(()=>({})); throw new Error(e.error || 'Error al importar'); }
        DATA = await res.json();
        PUNTOS = DATA.puntos || [];
        renderChips(DATA.resumen);
        renderPreview();
        const fc = document.getElementById('flotaCard');
        fc.style.opacity = '1'; fc.style.pointerEvents = 'auto';
        renderFleet();
        document.getElementById('btnPlan').disabled = PUNTOS.length === 0;
        document.getElementById('btnImportar').innerHTML = '<i class="bi bi-arrow-repeat"></i> Reimportar';
    } catch (err) {
        document.getElementById('result').innerHTML = '<div class="errbox"><i class="bi bi-exclamation-octagon"></i> ' + err.message + '</div>';
    } finally {
        document.getElementById('btnImportar').disabled = false;
    }
}

function renderChips(r) {
    const c = document.getElementById('chips');
    c.classList.remove('hidden');
    c.innerHTML = `
        <div class="chip"><i class="bi bi-geo-alt"></i><div><div class="n">${r.puntos}</div><div class="l">Puntos de entrega</div></div></div>
        <div class="chip"><i class="bi bi-box-seam"></i><div><div class="n">${r.toneladas} T</div><div class="l">Peso total</div></div></div>
        <div class="chip"><i class="bi bi-list-ul"></i><div><div class="n">${r.lineas}</div><div class="l">Líneas</div></div></div>
        <div class="chip warn"><i class="bi bi-exclamation-triangle"></i><div><div class="n">${r.exceden}</div><div class="l">Exceden 22 T</div></div></div>`;
}

function ptRow(p) {
    const et = p.zona != null ? ('Z' + p.zona) : (p.departamento ? p.departamento.slice(0,7) : '—');
    const ovTxt = p.nOV > 1 ? ` <small>· ${p.nOV} OV</small>` : '';
    return `<div class="pt"><span class="z">${et}</span>
        <span class="cli">${esc(p.cliente)}${ovTxt}</span>
        <span class="pw">${p.peso.toLocaleString()} kg</span></div>`;
}

function renderPreview() {
    if (!PUNTOS.length) {
        document.getElementById('result').innerHTML = '<div class="empty"><i class="bi bi-inbox"></i><p>No hay pedidos pendientes para esa fecha.</p></div>';
        return;
    }
    const especiales = PUNTOS.filter(p => p.excede);
    const regional   = PUNTOS.filter(p => !p.excede && p.region === 'regional');
    const metro       = PUNTOS.filter(p => !p.excede && p.region === 'metro');

    let html = '<div class="info-banner"><i class="bi bi-info-circle"></i> Datos importados. Ajusta la flota y presiona <b>Planificar</b> para agrupar en rutas (próximamente).</div>';

    if (especiales.length) {
        html += `<div class="section-title" style="color:var(--warn)"><i class="bi bi-exclamation-triangle-fill"></i> Especiales <span class="badge">${especiales.length}</span></div>`;
        html += especiales.map(p => `
            <div class="group especial">
              <div class="group-h">
                <div class="group-name">${esc(p.cliente)}</div>
                <div class="group-meta"><b>${p.peso.toLocaleString()} kg</b> · ${p.departamento||'—'}</div>
              </div>
              <div class="especial-note"><i class="bi bi-exclamation-triangle"></i> Supera el camión más grande (22 T) — requiere flete dedicado o viajes múltiples.</div>
            </div>`).join('');
    }

    html += sectionByKey('🌎 Regionales', 'bi-globe-americas', regional, p => p.departamento || 'Sin depto.');
    html += sectionByKey('🏙️ Metropolitanas', 'bi-buildings', metro, p => p.zona != null ? ('Zona ' + p.zona) : 'Sin zona');

    document.getElementById('result').innerHTML = html;
}

// Agrupa una lista de puntos por una clave (depto o zona) en tarjetas colapsables
function sectionByKey(title, icon, pts, keyFn) {
    if (!pts.length) return '';
    const groups = {};
    pts.forEach(p => { const k = keyFn(p); (groups[k] = groups[k] || []).push(p); });
    const keys = Object.keys(groups).sort((a,b) =>
        groups[b].reduce((s,p)=>s+p.peso,0) - groups[a].reduce((s,p)=>s+p.peso,0));
    let html = `<div class="section-title"><i class="bi ${icon}"></i> ${title} <span class="badge">${pts.length} pts</span></div>`;
    html += keys.map(k => {
        const g = groups[k]; const peso = g.reduce((s,p)=>s+p.peso,0);
        return `<div class="group">
            <div class="group-h" onclick="this.parentNode.classList.toggle('open')">
              <div class="group-name">${esc(k)}</div>
              <div class="group-meta"><b>${peso.toLocaleString()} kg</b> · ${g.length} pts</div>
            </div>
            <div class="group-pts">${g.sort((a,b)=>b.peso-a.peso).map(ptRow).join('')}</div>
          </div>`;
    }).join('');
    return html;
}

function planificar() {
    // Fase 3: aquí se enviarán los puntos + flota a la API de Anthropic
    // para obtener las rutas agrupadas y balanceadas.
    document.getElementById('result').scrollIntoView({behavior:'smooth'});
    const r = document.getElementById('result');
    const banner = '<div class="info-banner"><i class="bi bi-stars"></i> <b>Planificación con IA (Fase 3)</b> — próximamente: aquí se agruparán los ' + PUNTOS.length + ' puntos en rutas por camión, respetando capacidad, ≤5 puntos y balance de carga.</div>';
    if (!r.innerHTML.includes('Planificación con IA')) r.insertAdjacentHTML('afterbegin', banner);
}

function esc(s) { const d = document.createElement('div'); d.textContent = s || ''; return d.innerHTML; }
</script>
</body>
</html>
