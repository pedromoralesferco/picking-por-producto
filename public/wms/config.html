<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WMS DIMORA - Configuracion</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --primary: #d4a826; --primary-dark: #b8941f;
            --bg: #0a0a0f; --surface: #12121a; --surface2: #1a1a25;
            --text: #e8e8ed; --text2: #9898a8; --border: #2a2a3a;
            --success: #22c55e; --warning: #f59e0b; --danger: #ef4444; --info: #3b82f6;
        }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

        .topbar {
            background: var(--surface); border-bottom: 1px solid var(--border);
            padding: 0.75rem 1.5rem; display: flex; align-items: center; justify-content: space-between;
        }
        .topbar-title { font-size: 1.1rem; font-weight: 600; color: var(--primary); }
        .topbar-user { color: var(--text2); font-size: 0.85rem; display: flex; align-items: center; gap: 0.75rem; }
        .btn-logout {
            background: transparent; border: 1px solid var(--border); color: var(--text2);
            padding: 0.35rem 0.75rem; border-radius: 6px; cursor: pointer; font-size: 0.8rem; text-decoration: none;
        }
        .btn-logout:hover { border-color: var(--danger); color: var(--danger); }

        .container { max-width: 1200px; margin: 0 auto; padding: 1.5rem; }

        .tabs { display: flex; gap: 0; border-bottom: 1px solid var(--border); margin-bottom: 1.5rem; }
        .tab {
            padding: 0.75rem 1.5rem; cursor: pointer; color: var(--text2); font-size: 0.9rem;
            border-bottom: 2px solid transparent; transition: all 0.2s; background: none; border-top: none; border-left: none; border-right: none;
        }
        .tab:hover { color: var(--text); }
        .tab.active { color: var(--primary); border-bottom-color: var(--primary); }

        .tab-content { display: none; }
        .tab-content.active { display: block; }

        .toolbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; }
        .toolbar h2 { font-size: 1rem; color: var(--text2); font-weight: 500; }

        .btn-primary {
            background: var(--primary); color: #000; border: none; padding: 0.5rem 1rem;
            border-radius: 6px; cursor: pointer; font-size: 0.85rem; font-weight: 600; display: inline-flex; align-items: center; gap: 0.4rem;
        }
        .btn-primary:hover { background: var(--primary-dark); }

        table { width: 100%; border-collapse: collapse; background: var(--surface); border-radius: 8px; overflow: hidden; }
        thead th {
            text-align: left; padding: 0.75rem 1rem; background: var(--surface2); color: var(--text2);
            font-size: 0.75rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px;
        }
        tbody td { padding: 0.65rem 1rem; border-top: 1px solid var(--border); font-size: 0.85rem; }
        tbody tr:hover { background: var(--surface2); }

        .btn-icon {
            background: transparent; border: 1px solid var(--border); color: var(--text2);
            width: 30px; height: 30px; border-radius: 6px; cursor: pointer; display: inline-flex;
            align-items: center; justify-content: center; font-size: 0.85rem;
        }
        .btn-icon:hover { border-color: var(--primary); color: var(--primary); }

        .toggle {
            position: relative; width: 40px; height: 22px; background: var(--border); border-radius: 11px;
            cursor: pointer; transition: background 0.2s; border: none;
        }
        .toggle::after {
            content: ''; position: absolute; top: 3px; left: 3px; width: 16px; height: 16px;
            background: var(--text2); border-radius: 50%; transition: all 0.2s;
        }
        .toggle.active { background: var(--success); }
        .toggle.active::after { left: 21px; background: #fff; }

        .note-box {
            background: var(--surface); border: 1px solid var(--border); border-radius: 8px;
            padding: 1.25rem; color: var(--text2); font-size: 0.85rem; line-height: 1.6;
            display: flex; align-items: flex-start; gap: 0.75rem;
        }
        .note-box i { color: var(--info); font-size: 1.1rem; margin-top: 0.1rem; }

        /* Modal */
        .modal-overlay {
            display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6);
            z-index: 1000; align-items: center; justify-content: center;
        }
        .modal-overlay.active { display: flex; }
        .modal {
            background: var(--surface); border: 1px solid var(--border); border-radius: 12px;
            width: 95%; max-width: 540px; max-height: 90vh; overflow-y: auto;
        }
        .modal-header {
            padding: 1rem 1.25rem; border-bottom: 1px solid var(--border);
            display: flex; justify-content: space-between; align-items: center;
        }
        .modal-header h3 { font-size: 1rem; }
        .modal-close { background: none; border: none; color: var(--text2); cursor: pointer; font-size: 1.2rem; }
        .modal-close:hover { color: var(--text); }
        .modal-body { padding: 1.25rem; }
        .modal-footer { padding: 1rem 1.25rem; border-top: 1px solid var(--border); display: flex; justify-content: flex-end; gap: 0.5rem; }

        .form-group { margin-bottom: 1rem; }
        .form-group label { display: block; margin-bottom: 0.35rem; font-size: 0.8rem; color: var(--text2); }
        .form-group input, .form-group select {
            width: 100%; padding: 0.5rem 0.75rem; background: var(--bg); border: 1px solid var(--border);
            border-radius: 6px; color: var(--text); font-size: 0.85rem;
        }
        .form-group input:focus, .form-group select:focus { outline: none; border-color: var(--primary); }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }

        .btn-cancel {
            background: transparent; border: 1px solid var(--border); color: var(--text2);
            padding: 0.5rem 1rem; border-radius: 6px; cursor: pointer; font-size: 0.85rem;
        }
        .btn-cancel:hover { border-color: var(--text2); color: var(--text); }

        .loading { text-align: center; padding: 2rem; color: var(--text2); }
        .empty-state { text-align: center; padding: 3rem; color: var(--text2); }
        .empty-state i { font-size: 2rem; margin-bottom: 0.5rem; display: block; }
    </style>
</head>
<body>
    <div class="topbar">
        <div class="topbar-title"><i class="bi bi-gear"></i> WMS DIMORA - Configuracion</div>
        <div class="topbar-user">
            <span id="userName"></span>
            <a href="/wms" class="btn-logout"><i class="bi bi-arrow-left"></i> WMS</a>
            <button class="btn-logout" onclick="logout()"><i class="bi bi-box-arrow-right"></i> Salir</button>
        </div>
    </div>

    <div class="container">
        <div class="tabs">
            <button class="tab active" data-tab="ubicaciones"><i class="bi bi-geo-alt"></i> Ubicaciones</button>
            <button class="tab" data-tab="operadores"><i class="bi bi-people"></i> Operadores</button>
        </div>

        <!-- Ubicaciones Tab -->
        <div id="tab-ubicaciones" class="tab-content active">
            <div class="toolbar">
                <h2>Ubicaciones de Bodega</h2>
                <button class="btn-primary" onclick="openModal()"><i class="bi bi-plus-lg"></i> Nueva Ubicacion</button>
            </div>
            <div id="ubicacionesTable"><div class="loading"><i class="bi bi-arrow-repeat"></i> Cargando...</div></div>
        </div>

        <!-- Operadores Tab -->
        <div id="tab-operadores" class="tab-content">
            <div class="toolbar">
                <h2>Operadores WMS</h2>
            </div>
            <div class="note-box" style="margin-bottom:1rem;">
                <i class="bi bi-info-circle"></i>
                <span>Los operadores WMS se gestionan desde el panel de Admin principal asignando permisos <strong>wms_*</strong></span>
            </div>
            <div id="operadoresTable"><div class="loading"><i class="bi bi-arrow-repeat"></i> Cargando...</div></div>
        </div>
    </div>

    <!-- Modal Ubicacion -->
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal">
            <div class="modal-header">
                <h3 id="modalTitle">Nueva Ubicacion</h3>
                <button class="modal-close" onclick="closeModal()"><i class="bi bi-x-lg"></i></button>
            </div>
            <div class="modal-body">
                <input type="hidden" id="editId">
                <div class="form-row">
                    <div class="form-group">
                        <label>Codigo</label>
                        <input type="text" id="fCodigo" placeholder="Ej: A-01-01-01">
                    </div>
                    <div class="form-group">
                        <label>Zona</label>
                        <input type="text" id="fZona" placeholder="Ej: Almacen General">
                    </div>
                </div>
                <div class="form-group">
                    <label>Descripcion</label>
                    <input type="text" id="fDescripcion" placeholder="Descripcion de la ubicacion">
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Pasillo</label>
                        <input type="text" id="fPasillo" placeholder="Ej: A">
                    </div>
                    <div class="form-group">
                        <label>Rack</label>
                        <input type="text" id="fRack" placeholder="Ej: 01">
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Nivel</label>
                        <input type="text" id="fNivel" placeholder="Ej: 01">
                    </div>
                    <div class="form-group">
                        <label>Activo</label>
                        <select id="fActivo">
                            <option value="1">Si</option>
                            <option value="0">No</option>
                        </select>
                    </div>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn-cancel" onclick="closeModal()">Cancelar</button>
                <button class="btn-primary" onclick="saveUbicacion()"><i class="bi bi-check-lg"></i> Guardar</button>
            </div>
        </div>
    </div>

    <script>
        let ubicaciones = [];
        let operadores = [];

        // Auth
        async function init() {
            try {
                const res = await fetch('/api/auth/me');
                if (!res.ok) return window.location.href = '/login';
                const user = await res.json();
                document.getElementById('userName').textContent = user.nombre;
                loadUbicaciones();
                loadOperadores();
            } catch { window.location.href = '/login'; }
        }

        async function logout() {
            await fetch('/api/auth/logout', { method: 'POST' });
            window.location.href = '/login';
        }

        // Tabs
        document.querySelectorAll('.tab').forEach(tab => {
            tab.addEventListener('click', () => {
                document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
                tab.classList.add('active');
                document.getElementById('tab-' + tab.dataset.tab).classList.add('active');
            });
        });

        // Ubicaciones
        async function loadUbicaciones() {
            try {
                const res = await fetch('/api/wms/ubicaciones');
                if (!res.ok) throw new Error();
                ubicaciones = await res.json();
                renderUbicaciones();
            } catch {
                document.getElementById('ubicacionesTable').innerHTML = '<div class="empty-state"><i class="bi bi-exclamation-triangle"></i>Error al cargar ubicaciones</div>';
            }
        }

        function renderUbicaciones() {
            const el = document.getElementById('ubicacionesTable');
            if (!ubicaciones.length) {
                el.innerHTML = '<div class="empty-state"><i class="bi bi-geo-alt"></i>No hay ubicaciones registradas</div>';
                return;
            }
            el.innerHTML = `
                <table>
                    <thead>
                        <tr>
                            <th>Codigo</th><th>Descripcion</th><th>Zona</th>
                            <th>Pasillo</th><th>Rack</th><th>Nivel</th><th>Activo</th><th></th>
                        </tr>
                    </thead>
                    <tbody>
                        ${ubicaciones.map(u => `
                            <tr>
                                <td><strong>${esc(u.Codigo)}</strong></td>
                                <td>${esc(u.Descripcion || '')}</td>
                                <td>${esc(u.Zona || '')}</td>
                                <td>${esc(u.Pasillo || '')}</td>
                                <td>${esc(u.Rack || '')}</td>
                                <td>${esc(u.Nivel || '')}</td>
                                <td>
                                    <button class="toggle ${u.Activo ? 'active' : ''}" onclick="toggleActivo(${u.ID_Ubicacion}, ${u.Activo ? 0 : 1})"></button>
                                </td>
                                <td>
                                    <button class="btn-icon" onclick="editUbicacion(${u.ID_Ubicacion})" title="Editar"><i class="bi bi-pencil"></i></button>
                                </td>
                            </tr>
                        `).join('')}
                    </tbody>
                </table>
            `;
        }

        async function toggleActivo(id, nuevoValor) {
            try {
                const ub = ubicaciones.find(u => u.ID_Ubicacion === id);
                if (!ub) return;
                await fetch('/api/wms/ubicaciones/' + id, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ ...ub, Activo: nuevoValor })
                });
                loadUbicaciones();
            } catch { alert('Error al actualizar'); }
        }

        // Modal
        function openModal(data) {
            document.getElementById('modalTitle').textContent = data ? 'Editar Ubicacion' : 'Nueva Ubicacion';
            document.getElementById('editId').value = data ? data.ID_Ubicacion : '';
            document.getElementById('fCodigo').value = data ? data.Codigo || '' : '';
            document.getElementById('fDescripcion').value = data ? data.Descripcion || '' : '';
            document.getElementById('fZona').value = data ? data.Zona || '' : '';
            document.getElementById('fPasillo').value = data ? data.Pasillo || '' : '';
            document.getElementById('fRack').value = data ? data.Rack || '' : '';
            document.getElementById('fNivel').value = data ? data.Nivel || '' : '';
            document.getElementById('fActivo').value = data ? (data.Activo ? '1' : '0') : '1';
            document.getElementById('modalOverlay').classList.add('active');
        }

        function closeModal() {
            document.getElementById('modalOverlay').classList.remove('active');
        }

        function editUbicacion(id) {
            const ub = ubicaciones.find(u => u.ID_Ubicacion === id);
            if (ub) openModal(ub);
        }

        async function saveUbicacion() {
            const id = document.getElementById('editId').value;
            const body = {
                Codigo: document.getElementById('fCodigo').value.trim(),
                Descripcion: document.getElementById('fDescripcion').value.trim(),
                Zona: document.getElementById('fZona').value.trim(),
                Pasillo: document.getElementById('fPasillo').value.trim(),
                Rack: document.getElementById('fRack').value.trim(),
                Nivel: document.getElementById('fNivel').value.trim(),
                Activo: parseInt(document.getElementById('fActivo').value)
            };
            if (!body.Codigo) return alert('El codigo es requerido');
            try {
                const url = id ? '/api/wms/ubicaciones/' + id : '/api/wms/ubicaciones';
                const method = id ? 'PUT' : 'POST';
                const res = await fetch(url, {
                    method,
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(body)
                });
                if (!res.ok) {
                    const err = await res.json().catch(() => ({}));
                    throw new Error(err.error || 'Error al guardar');
                }
                closeModal();
                loadUbicaciones();
            } catch (e) { alert(e.message); }
        }

        // Operadores
        async function loadOperadores() {
            try {
                const res = await fetch('/api/wms/operadores');
                if (!res.ok) throw new Error();
                operadores = await res.json();
                renderOperadores();
            } catch {
                document.getElementById('operadoresTable').innerHTML = '<div class="empty-state"><i class="bi bi-exclamation-triangle"></i>Error al cargar operadores</div>';
            }
        }

        function renderOperadores() {
            const el = document.getElementById('operadoresTable');
            if (!operadores.length) {
                el.innerHTML = '<div class="empty-state"><i class="bi bi-people"></i>No hay operadores con permisos WMS</div>';
                return;
            }
            el.innerHTML = `
                <table>
                    <thead>
                        <tr><th>Nombre</th><th>Nombre de Usuario</th></tr>
                    </thead>
                    <tbody>
                        ${operadores.map(o => `
                            <tr>
                                <td><i class="bi bi-person" style="color:var(--primary);margin-right:0.5rem"></i>${esc(o.Nombre)}</td>
                                <td style="color:var(--text2)">${esc(o.NombreUsuario)}</td>
                            </tr>
                        `).join('')}
                    </tbody>
                </table>
            `;
        }

        // Escape HTML
        function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

        // Close modal on overlay click
        document.getElementById('modalOverlay').addEventListener('click', e => {
            if (e.target === e.currentTarget) closeModal();
        });

        init();
    </script>
</body>
</html>
