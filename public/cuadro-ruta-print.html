<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cuadro de Ruta</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.2/html2pdf.bundle.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: Arial, Helvetica, sans-serif;
            font-size: 10px;
            color: #000;
            background: #f5f5f5;
        }

        /* ── PDF content area ── */
        #pdf-content {
            width: 277mm; /* A4 landscape minus margins */
            padding: 8mm;
            background: #fff;
            margin: 60px auto 20px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.1);
            position: relative;
        }

        /* ── Header: logo left, date right ── */
        .print-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 4px;
        }
        .logo-text {
            font-size: 32px;
            font-weight: 800;
            letter-spacing: 10px;
            color: #000;
            line-height: 1;
        }
        .logo-sub {
            font-size: 11px;
            letter-spacing: 5px;
            color: #c00;
            font-weight: 600;
        }
        .print-date {
            text-align: right;
            font-size: 9px;
            color: #333;
        }

        /* ── Title ── */
        .cuadro-title {
            text-align: center;
            font-size: 16px;
            font-weight: 700;
            margin: 10px 0 2px;
        }
        .cuadro-number {
            text-align: center;
            font-size: 20px;
            font-weight: 800;
            margin-bottom: 10px;
        }

        /* ── Info grid ── */
        .info-grid {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            font-size: 10px;
        }
        .info-col { width: 48%; }
        .info-row { display: flex; margin-bottom: 1px; }
        .info-label { font-weight: 700; min-width: 115px; }
        .info-value { flex: 1; }
        .info-right .info-label { text-align: right; min-width: 120px; margin-right: 6px; }

        /* ── Separator ── */
        .separator { border-top: 1px solid #000; margin: 6px 0; }

        /* ── Table ── */
        table { width: 100%; border-collapse: collapse; font-size: 9px; }
        th {
            border-bottom: 2px solid #000;
            border-top: 1px solid #000;
            padding: 4px 5px;
            text-align: left;
            font-weight: 700;
            text-decoration: underline;
            font-size: 9px;
        }
        td {
            padding: 3px 5px;
            border-bottom: 1px dashed #999;
            vertical-align: top;
        }
        .text-right { text-align: right; }
        .text-center { text-align: center; }

        .texto-largo-row td {
            padding: 1px 5px 4px 5px;
            border-bottom: 1px dashed #999;
            border-top: none;
            font-size: 8px;
            font-style: italic;
        }

        /* ── Watermark ── */
        .watermark {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) rotate(-35deg);
            font-size: 120px;
            font-weight: 900;
            color: rgba(200, 0, 0, 0.08);
            letter-spacing: 15px;
            pointer-events: none;
            z-index: 0;
            white-space: nowrap;
        }

        /* ── Toolbar ── */
        .toolbar {
            position: fixed;
            top: 0; left: 0; right: 0;
            background: #222;
            color: #fff;
            padding: 8px 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            z-index: 100;
            box-shadow: 0 2px 8px rgba(0,0,0,0.3);
        }
        .toolbar button {
            background: #d4a826;
            color: #222;
            border: none;
            padding: 6px 16px;
            border-radius: 6px;
            font-weight: 700;
            cursor: pointer;
            font-size: 12px;
        }
        .toolbar button:hover { background: #b8941f; }
        .toolbar button:disabled { background: #666; color: #999; cursor: wait; }
        .toolbar span { font-size: 13px; }

        .loading {
            text-align: center;
            padding: 60px;
            font-size: 14px;
            color: #999;
        }
    </style>
</head>
<body>
    <div class="toolbar">
        <button id="btnPdf" onclick="downloadPdf()" disabled>&#128196; Generando PDF...</button>
        <span id="toolbarTitle">Cuadro de Ruta</span>
    </div>

    <div id="pdf-content">
        <div class="loading" id="loadingMsg">Cargando cuadro de ruta...</div>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const routeNumber = params.get('ruta');
        let cuadroNum = routeNumber;

        async function loadCuadro() {
            if (!routeNumber) {
                document.getElementById('loadingMsg').textContent = 'Error: No se especifico numero de ruta';
                return;
            }
            try {
                const res = await fetch('/api/despacho/cuadro-ruta/' + routeNumber);
                if (!res.ok) {
                    const err = await res.json().catch(() => ({}));
                    throw new Error(err.error || 'Error ' + res.status);
                }
                const data = await res.json();
                cuadroNum = data.header.DocNum;
                renderCuadro(data);
                document.getElementById('toolbarTitle').textContent = 'Cuadro de Ruta #' + cuadroNum;
                document.title = 'Cuadro de Ruta #' + cuadroNum;

                // Auto-generate PDF
                generatePdf();
            } catch (err) {
                document.getElementById('loadingMsg').textContent = 'Error: ' + err.message;
            }
        }

        function generatePdf() {
            const element = document.getElementById('pdf-content');
            const opt = {
                margin:       [6, 8, 6, 8],
                filename:     'Cuadro_Ruta_' + cuadroNum + '.pdf',
                image:        { type: 'jpeg', quality: 0.98 },
                html2canvas:  { scale: 2, useCORS: true },
                jsPDF:        { unit: 'mm', format: 'letter', orientation: 'landscape' }
            };

            html2pdf().set(opt).from(element).toPdf().get('pdf').then(function(pdf) {
                const btn = document.getElementById('btnPdf');
                btn.textContent = '📄 Descargar PDF';
                btn.disabled = false;
            });
        }

        function downloadPdf() {
            const btn = document.getElementById('btnPdf');
            btn.disabled = true;
            btn.textContent = '⏳ Generando...';

            const element = document.getElementById('pdf-content');
            const opt = {
                margin:       [6, 8, 6, 8],
                filename:     'Cuadro_Ruta_' + cuadroNum + '.pdf',
                image:        { type: 'jpeg', quality: 0.98 },
                html2canvas:  { scale: 2, useCORS: true },
                jsPDF:        { unit: 'mm', format: 'letter', orientation: 'landscape' }
            };

            html2pdf().set(opt).from(element).save().then(function() {
                btn.textContent = '📄 Descargar PDF';
                btn.disabled = false;
            });
        }

        function fmtDate(d) {
            if (!d) return '';
            const dt = new Date(d);
            const day = String(dt.getDate()).padStart(2, '0');
            const months = ['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'];
            return day + '-' + months[dt.getMonth()] + '.-' + dt.getFullYear();
        }

        function fmtDateLong(d) {
            if (!d) return '';
            const dt = new Date(d);
            const day = String(dt.getDate()).padStart(2, '0');
            const months = ['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];
            return day + '-' + months[dt.getMonth()] + '-' + dt.getFullYear();
        }

        function fmtNum(n) {
            return parseFloat(n || 0).toLocaleString('es-GT', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
        }

        function esc(s) {
            if (!s) return '';
            const el = document.createElement('span');
            el.textContent = s;
            return el.innerHTML;
        }

        function renderCuadro(data) {
            const h = data.header;
            const lineas = data.lineas;
            const now = new Date();
            const printDate = fmtDateLong(now);
            const printTime = now.toLocaleTimeString('es-GT');

            const rows = lineas.map(l => {
                let html = `<tr>
                    <td>${l.TipoDocumento || 'OV'}</td>
                    <td>${esc(l.NumeroOV)}</td>
                    <td>${esc(l.ClienteCodigo)}<br><span style="font-size:8px">${esc(l.ClienteNombre)}</span></td>
                    <td class="text-center">${fmtDate(l.FechaCreacion)}</td>
                    <td class="text-center">${fmtDate(l.FechaEntrega)}</td>
                    <td>${esc(l.Direccion)}</td>
                    <td>${esc(l.Comentarios)}</td>
                    <td>${esc(l.Asesor)}</td>
                </tr>`;

                if (l.TextoLargo) {
                    html += `<tr class="texto-largo-row">
                        <td colspan="8">${esc(l.TextoLargo)}</td>
                    </tr>`;
                }
                return html;
            }).join('');

            const esBorrador = !h.Placa;

            document.getElementById('pdf-content').innerHTML = `
                ${esBorrador ? '<div class="watermark">BORRADOR</div>' : ''}
                <div class="print-header">
                    <div>
                        <div class="logo-text">F E R C O</div>
                        <div class="logo-sub">C E R &Aacute; M I C A</div>
                    </div>
                    <div class="print-date">
                        Fecha de impresion: ${printDate}<br>
                        Hora de impresion: ${printTime}
                    </div>
                </div>

                <div class="cuadro-title"># Cuadro de ruta</div>
                <div class="cuadro-number">${h.DocNum}</div>

                <div class="info-grid">
                    <div class="info-col">
                        <div class="info-row">
                            <div class="info-label">Transporte:</div>
                            <div class="info-value">${esc(h.Transporte) || ''}</div>
                        </div>
                        <div class="info-row">
                            <div class="info-value" style="margin-left:115px">${esc(h.Transportista)}</div>
                        </div>
                        <div class="info-row">
                            <div class="info-label">Piloto:</div>
                            <div class="info-value">${esc(h.Chofer) || ''}</div>
                        </div>
                        <div class="info-row">
                            <div class="info-label">Placa Camion :</div>
                            <div class="info-value">${esc(h.Placa) || ''}</div>
                        </div>
                        <div class="info-row">
                            <div class="info-label">Capacidad:</div>
                            <div class="info-value">${h.Capacidad || ''}</div>
                        </div>
                    </div>
                    <div class="info-col info-right">
                        <div class="info-row">
                            <div class="info-label">Nombre de ruta:</div>
                            <div class="info-value">${esc(h.NombreRuta)}</div>
                        </div>
                        <div class="info-row">
                            <div class="info-label">Fecha de Entrega:</div>
                            <div class="info-value">${fmtDate(h.FechaEntrega)}</div>
                        </div>
                        <div class="info-row">
                            <div class="info-label">Planificado por:</div>
                            <div class="info-value">${esc(h.Planificador) || ''}</div>
                        </div>
                        <div class="info-row">
                            <div class="info-label">Peso total:</div>
                            <div class="info-value">${fmtNum(h.PesoTotal / 1000)} TON</div>
                        </div>
                        <div class="info-row">
                            <div class="info-label">% Ocupacion:</div>
                            <div class="info-value">${h.Ocupacion > 0 ? fmtNum(h.Ocupacion) + ' %' : ''}</div>
                        </div>
                    </div>
                </div>

                <div class="separator"></div>

                <table>
                    <thead>
                        <tr>
                            <th style="width:35px">Tipo</th>
                            <th style="width:95px">Documento No.</th>
                            <th style="width:140px">Codigo_Cliente</th>
                            <th style="width:80px" class="text-center">Fecha<br>Creacion</th>
                            <th style="width:80px" class="text-center">Fecha<br>Entrega :</th>
                            <th>Direccion</th>
                            <th>Comentarios</th>
                            <th style="width:100px">Asesor</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${rows}
                    </tbody>
                </table>
            `;
        }

        loadCuadro();
    </script>
</body>
</html>
