<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Cuadro de Ruta</title>
    <style>
        @page {
            size: landscape;
            margin: 8mm 10mm;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: Arial, Helvetica, sans-serif;
            font-size: 10px;
            color: #000;
            padding: 6mm;
        }

        /* ── Header: logo left, date right ── */
        .print-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 4px;
        }
        .logo-text {
            font-size: 32px;
            font-weight: 800;
            letter-spacing: 10px;
            color: #000;
            line-height: 1;
        }
        .logo-sub {
            font-size: 11px;
            letter-spacing: 5px;
            color: #c00;
            font-weight: 600;
        }
        .print-date {
            text-align: right;
            font-size: 9px;
            color: #333;
        }

        /* ── Title ── */
        .cuadro-title {
            text-align: center;
            font-size: 16px;
            font-weight: 700;
            margin: 10px 0 2px;
        }
        .cuadro-number {
            text-align: center;
            font-size: 20px;
            font-weight: 800;
            margin-bottom: 10px;
        }

        /* ── Info grid: transport left, route right ── */
        .info-grid {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            font-size: 10px;
        }
        .info-col { width: 48%; }
        .info-row {
            display: flex;
            margin-bottom: 1px;
        }
        .info-label {
            font-weight: 700;
            min-width: 115px;
        }
        .info-value { flex: 1; }
        .info-right .info-label { text-align: right; min-width: 120px; margin-right: 6px; }

        /* ── Separator line ── */
        .separator {
            border-top: 1px solid #000;
            margin: 6px 0;
        }

        /* ── Table ── */
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 9px;
        }
        th {
            border-bottom: 2px solid #000;
            border-top: 1px solid #000;
            padding: 4px 5px;
            text-align: left;
            font-weight: 700;
            text-decoration: underline;
            font-size: 9px;
        }
        td {
            padding: 3px 5px;
            border-bottom: 1px dashed #999;
            vertical-align: top;
        }
        .text-right { text-align: right; }
        .text-center { text-align: center; }

        /* ── Texto largo (req entrega) below row ── */
        .texto-largo-row td {
            padding: 1px 5px 4px 5px;
            border-bottom: 1px dashed #999;
            border-top: none;
            font-size: 8px;
            font-style: italic;
        }

        /* ── Loading ── */
        .loading {
            text-align: center;
            padding: 40px;
            font-size: 14px;
            color: #999;
        }

        /* ── Toolbar (screen only) ── */
        .toolbar {
            position: fixed;
            top: 0; left: 0; right: 0;
            background: #222;
            color: #fff;
            padding: 8px 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            z-index: 100;
            box-shadow: 0 2px 8px rgba(0,0,0,0.3);
        }
        .toolbar button {
            background: #d4a826;
            color: #222;
            border: none;
            padding: 6px 16px;
            border-radius: 6px;
            font-weight: 700;
            cursor: pointer;
            font-size: 12px;
        }
        .toolbar button:hover { background: #b8941f; }
        .toolbar span { font-size: 13px; }
        body { padding-top: 48px; }

        @media print {
            body { padding: 0; }
            .toolbar { display: none !important; }
        }
    </style>
</head>
<body>
    <div class="toolbar">
        <button onclick="window.print()">&#128424; Imprimir</button>
        <span id="toolbarTitle">Cuadro de Ruta</span>
    </div>

    <div id="content">
        <div class="loading" id="loadingMsg">Cargando cuadro de ruta...</div>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const routeNumber = params.get('ruta');

        async function loadCuadro() {
            if (!routeNumber) {
                document.getElementById('loadingMsg').textContent = 'Error: No se especifico numero de ruta';
                return;
            }
            try {
                const res = await fetch('/api/despacho/cuadro-ruta/' + routeNumber);
                if (!res.ok) {
                    const err = await res.json().catch(() => ({}));
                    throw new Error(err.error || 'Error ' + res.status);
                }
                const data = await res.json();
                renderCuadro(data);
                document.getElementById('toolbarTitle').textContent = 'Cuadro de Ruta #' + routeNumber;
                document.title = 'Cuadro de Ruta #' + routeNumber;
            } catch (err) {
                document.getElementById('loadingMsg').textContent = 'Error: ' + err.message;
            }
        }

        function fmtDate(d) {
            if (!d) return '';
            const dt = new Date(d);
            const day = String(dt.getDate()).padStart(2, '0');
            const months = ['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'];
            return day + '-' + months[dt.getMonth()] + '.-' + dt.getFullYear();
        }

        function fmtDateLong(d) {
            if (!d) return '';
            const dt = new Date(d);
            const day = String(dt.getDate()).padStart(2, '0');
            const months = ['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];
            return day + '-' + months[dt.getMonth()] + '-' + dt.getFullYear();
        }

        function fmtNum(n) {
            return parseFloat(n || 0).toLocaleString('es-GT', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
        }

        function esc(s) {
            if (!s) return '';
            const el = document.createElement('span');
            el.textContent = s;
            return el.innerHTML;
        }

        function renderCuadro(data) {
            const h = data.header;
            const lineas = data.lineas;
            const now = new Date();
            const printDate = fmtDateLong(now);
            const printTime = now.toLocaleTimeString('es-GT');

            const rows = lineas.map(l => {
                let html = `<tr>
                    <td>${l.TipoDocumento || 'OV'}</td>
                    <td>${esc(l.NumeroOV)}</td>
                    <td>${esc(l.ClienteCodigo)}<br><span style="font-size:8px">${esc(l.ClienteNombre)}</span></td>
                    <td class="text-center">${fmtDate(l.FechaCreacion)}</td>
                    <td class="text-center">${fmtDate(l.FechaEntrega)}</td>
                    <td>${esc(l.Direccion)}</td>
                    <td>${esc(l.Comentarios)}</td>
                    <td>${esc(l.Asesor)}</td>
                </tr>`;

                if (l.TextoLargo) {
                    html += `<tr class="texto-largo-row">
                        <td colspan="8">${esc(l.TextoLargo)}</td>
                    </tr>`;
                }
                return html;
            }).join('');

            document.getElementById('content').innerHTML = `
                <div class="print-header">
                    <div>
                        <div class="logo-text">F E R C O</div>
                        <div class="logo-sub">C E R &Aacute; M I C A</div>
                    </div>
                    <div class="print-date">
                        Fecha de impresion: ${printDate}<br>
                        Hora de impresion: ${printTime}
                    </div>
                </div>

                <div class="cuadro-title"># Cuadro de ruta</div>
                <div class="cuadro-number">${h.DocNum}</div>

                <div class="info-grid">
                    <div class="info-col">
                        <div class="info-row">
                            <div class="info-label">Transporte:</div>
                            <div class="info-value">${esc(h.Transporte) || ''}</div>
                        </div>
                        <div class="info-row">
                            <div class="info-value" style="margin-left:115px">${esc(h.Transportista)}</div>
                        </div>
                        <div class="info-row">
                            <div class="info-label">Piloto:</div>
                            <div class="info-value">${esc(h.Chofer) || ''}</div>
                        </div>
                        <div class="info-row">
                            <div class="info-label">Placa Camion :</div>
                            <div class="info-value">${esc(h.Placa) || ''}</div>
                        </div>
                        <div class="info-row">
                            <div class="info-label">Capacidad:</div>
                            <div class="info-value">${h.Capacidad || ''}</div>
                        </div>
                    </div>
                    <div class="info-col info-right">
                        <div class="info-row">
                            <div class="info-label">Nombre de ruta:</div>
                            <div class="info-value">${esc(h.NombreRuta)}</div>
                        </div>
                        <div class="info-row">
                            <div class="info-label">Fecha de Entrega:</div>
                            <div class="info-value">${fmtDate(h.FechaEntrega)}</div>
                        </div>
                        <div class="info-row">
                            <div class="info-label">Planificado por:</div>
                            <div class="info-value">${esc(h.Planificador) || ''}</div>
                        </div>
                        <div class="info-row">
                            <div class="info-label">Peso total:</div>
                            <div class="info-value">${fmtNum(h.PesoTotal / 1000)} TON</div>
                        </div>
                        <div class="info-row">
                            <div class="info-label">% Ocupacion:</div>
                            <div class="info-value">${h.Ocupacion > 0 ? fmtNum(h.Ocupacion) + ' %' : ''}</div>
                        </div>
                    </div>
                </div>

                <div class="separator"></div>

                <table>
                    <thead>
                        <tr>
                            <th style="width:35px">Tipo</th>
                            <th style="width:95px">Documento No.</th>
                            <th style="width:140px">Codigo_Cliente</th>
                            <th style="width:80px" class="text-center">Fecha<br>Creacion</th>
                            <th style="width:80px" class="text-center">Fecha<br>Entrega :</th>
                            <th>Direccion</th>
                            <th>Comentarios</th>
                            <th style="width:100px">Asesor</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${rows}
                    </tbody>
                </table>
            `;
        }

        loadCuadro();
    </script>
</body>
</html>
