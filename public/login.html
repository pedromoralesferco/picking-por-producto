<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesion - Picking por Producto</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a1a 0%, #2d2d2d 40%, #222222 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-container {
            width: 100%;
            max-width: 400px;
            padding: 1.5rem;
        }

        .login-header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .login-header .brand {
            font-size: 1.3rem;
            font-weight: 800;
            letter-spacing: 3px;
            color: #d4a826;
            margin-bottom: 0.2rem;
        }

        .login-header .subtitle {
            font-size: 0.85rem;
            color: rgba(255,255,255,0.5);
        }

        .login-card {
            background: #fff;
            border-radius: 16px;
            padding: 2rem;
            box-shadow: 0 8px 30px rgba(0,0,0,0.2);
        }

        .login-card h2 {
            font-size: 1.2rem;
            font-weight: 700;
            color: #222;
            margin-bottom: 1.5rem;
            text-align: center;
        }

        .form-group {
            margin-bottom: 1.2rem;
        }

        .form-group label {
            display: block;
            font-size: 0.82rem;
            font-weight: 600;
            color: #555;
            margin-bottom: 0.4rem;
        }

        .form-group input {
            width: 100%;
            padding: 0.7rem 0.9rem;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 0.95rem;
            transition: border-color 0.2s;
            outline: none;
        }

        .form-group input:focus {
            border-color: #d4a826;
        }

        .btn-login {
            width: 100%;
            padding: 0.75rem;
            background: linear-gradient(135deg, #b8941f, #d4a826);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: opacity 0.2s;
            margin-top: 0.5rem;
        }

        .btn-login:hover { opacity: 0.9; }
        .btn-login:disabled { opacity: 0.5; cursor: not-allowed; }

        .error-msg {
            background: #fef2f2;
            color: #c62828;
            border: 1px solid #fecaca;
            border-radius: 8px;
            padding: 0.6rem 0.8rem;
            font-size: 0.85rem;
            margin-bottom: 1rem;
            display: none;
        }

        .back-link {
            display: block;
            text-align: center;
            margin-top: 1.5rem;
            color: rgba(255,255,255,0.5);
            text-decoration: none;
            font-size: 0.85rem;
            transition: color 0.2s;
        }

        .back-link:hover { color: #d4a826; }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-header">
            <div class="brand">FERCO CERAMICA</div>
            <div class="subtitle">Picking Management</div>
        </div>

        <div class="login-card">
            <h2><i class="bi bi-shield-lock" style="color:#d4a826"></i> Iniciar Sesion</h2>

            <div class="error-msg" id="errorMsg"></div>

            <form id="loginForm" onsubmit="doLogin(event)">
                <div class="form-group">
                    <label>Usuario</label>
                    <input type="text" id="usuario" autocomplete="username" autofocus required>
                </div>
                <div class="form-group">
                    <label>Contrasena</label>
                    <input type="password" id="password" autocomplete="current-password" required>
                </div>
                <button type="submit" class="btn-login" id="btnLogin">Iniciar Sesion</button>
            </form>
        </div>

        <a href="/" class="back-link"><i class="bi bi-arrow-left"></i> Volver al inicio</a>
    </div>

    <script>
        async function doLogin(e) {
            e.preventDefault();
            const btn = document.getElementById('btnLogin');
            const errEl = document.getElementById('errorMsg');
            errEl.style.display = 'none';
            btn.disabled = true;
            btn.textContent = 'Verificando...';

            try {
                const res = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        usuario: document.getElementById('usuario').value.trim(),
                        password: document.getElementById('password').value
                    })
                });
                const data = await res.json();

                if (!res.ok) {
                    errEl.textContent = data.error || 'Error al iniciar sesion';
                    errEl.style.display = 'block';
                    btn.disabled = false;
                    btn.textContent = 'Iniciar Sesion';
                    return;
                }

                window.location.href = '/dashboard';
            } catch (err) {
                errEl.textContent = 'Error de conexion con el servidor';
                errEl.style.display = 'block';
                btn.disabled = false;
                btn.textContent = 'Iniciar Sesion';
            }
        }
    </script>
</body>
</html>
